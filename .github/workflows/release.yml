#
# Release topology:
# 1. Push to main: Release Please opens/updates the release PR only (skip-github-release).
# 2. Automerge or recovery dispatch: recovery-validation locks an exact immutable ref.
# 3. gate-ci-green waits for ci.yml success on that exact SHA (blocks publish on failure).
# 4. publish runs preflight, version checks, and Hex publish from frozen source.
# 5. public_verify waits for Hex indexing and proves the public artifact on a fresh runner.
#
name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      recovery_reason:
        description: "Recovery-only note for rerunning publish from an exact immutable ref"
        required: true
        type: string
      recovery_ref:
        description: "Exact commit SHA or existing tag to recover"
        required: true
        type: string

concurrency:
  group: release-publish-rindle
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-please:
    name: Release Please
    if: ${{ github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created || 'false' }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-release: true

  recovery-validation:
    name: Validate Recovery Ref
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    outputs:
      checkout_ref: ${{ steps.validate.outputs.checkout_ref }}
      release_tag: ${{ steps.validate.outputs.release_tag }}
    steps:
      - name: Checkout repository for recovery validation
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Validate recovery-only inputs and lock to an immutable ref
        id: validate
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ inputs.recovery_reason }}"
          recovery_ref="${{ inputs.recovery_ref }}"
          test -n "$recovery_ref"

          if [[ "$recovery_ref" =~ ^[0-9a-f]{40}$ ]]; then
            git cat-file -e "${recovery_ref}^{commit}"
            echo "checkout_ref=$recovery_ref" >> "$GITHUB_OUTPUT"
            echo "release_tag=" >> "$GITHUB_OUTPUT"
          elif git show-ref --verify --quiet "refs/tags/$recovery_ref"; then
            echo "checkout_ref=$recovery_ref" >> "$GITHUB_OUTPUT"
            echo "release_tag=$recovery_ref" >> "$GITHUB_OUTPUT"
          else
            echo "workflow_dispatch is recovery-only and recovery_ref must be an exact 40-character commit SHA or an existing tag."
            exit 1
          fi

  gate-ci-green:
    name: Gate on Exact-SHA Green CI
    needs: [recovery-validation]
    if: ${{ github.event_name == 'workflow_dispatch' && needs.recovery-validation.result == 'success' }}
    runs-on: ubuntu-22.04
    permissions:
      actions: read
      contents: read
    outputs:
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
      release_sha: ${{ steps.resolve.outputs.release_sha }}
      release_version: ${{ steps.version.outputs.release_version }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      ci_run_url: ${{ steps.ci.outputs.ci_run_url }}
    steps:
      - name: Resolve release target
        id: resolve
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const ref = '${{ needs.recovery-validation.outputs.checkout_ref }}';
            const releaseTag = '${{ needs.recovery-validation.outputs.release_tag }}';

            if (!ref) {
              core.setFailed('No release ref available for publish gating.');
              return;
            }

            const commit = await github.rest.repos.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref
            });

            core.setOutput('checkout_ref', ref);
            core.setOutput('release_sha', commit.data.sha);
            core.setOutput('release_tag', releaseTag || '');

      - name: Checkout release target for version resolution
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ steps.resolve.outputs.checkout_ref }}

      - name: Set up Elixir for version resolution
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Read release version from mix.exs
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(
            elixir -e '
              source = File.read!("mix.exs")

              version =
                Regex.run(~r/@version\s+"([^"]+)"/, source, capture: :all_but_first) ||
                  Regex.run(~r/version:\s+"([^"]+)"/, source, capture: :all_but_first)

              case version do
                [value] -> IO.puts(value)
                _ -> raise "Unable to parse version from mix.exs"
              end
            ' | tr -d '\r'
          )
          test -n "$VERSION"
          echo "release_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Wait for CI to finish green on release SHA
        id: ci
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const sha = '${{ steps.resolve.outputs.release_sha }}';
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            let latestUrl = '';

            for (let attempt = 1; attempt <= 60; attempt++) {
              const {data} = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'ci.yml',
                head_sha: sha,
                per_page: 20
              });

              const runs = data.workflow_runs.filter((run) => run.head_sha === sha);
              const latest = runs[0];

              if (!latest) {
                core.info(`No ci.yml runs found yet for ${sha} (${attempt}/60).`);
                await sleep(30000);
                continue;
              }

              latestUrl = latest.html_url;

              if (latest.status !== 'completed') {
                core.info(`ci.yml for ${sha} is ${latest.status} (${attempt}/60): ${latest.html_url}`);
                await sleep(30000);
                continue;
              }

              if (latest.conclusion !== 'success') {
                core.setFailed(`ci.yml for ${sha} concluded with '${latest.conclusion}', not 'success'. Run: ${latest.html_url}`);
                return;
              }

              core.setOutput('ci_run_url', latest.html_url);
              core.info(`ci.yml for ${sha} succeeded: ${latest.html_url}`);
              return;
            }

            core.setFailed(`Timed out waiting for ci.yml to succeed on ${sha}. Last observed run: ${latestUrl || 'none'}`);

  publish:
    name: Publish to Hex
    needs: [recovery-validation, gate-ci-green]
    if: ${{ github.event_name == 'workflow_dispatch' && needs.recovery-validation.result == 'success' && needs.gate-ci-green.result == 'success' }}
    runs-on: ubuntu-22.04
    environment: release
    permissions:
      contents: write
    outputs:
      release_version: ${{ needs.gate-ci-green.outputs.release_version }}
    env:
      MIX_ENV: dev
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      PGPORT: "5432"
      RINDLE_MINIO_URL: http://localhost:9000
      RINDLE_MINIO_ACCESS_KEY: minioadmin
      RINDLE_MINIO_SECRET_KEY: minioadmin
      RINDLE_MINIO_BUCKET: rindle-test
      RINDLE_MINIO_REGION: us-east-1

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rindle_test
        options: >-
          --health-cmd "pg_isready -U postgres -d rindle_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout current release tooling
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Materialize immutable release source tree
        id: release_source
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_ROOT="$RUNNER_TEMP/rindle-release-source"
          rm -rf "$RELEASE_ROOT"
          git worktree add --detach "$RELEASE_ROOT" "${{ needs.gate-ci-green.outputs.checkout_ref }}"
          echo "project_root=$RELEASE_ROOT" >> "$GITHUB_OUTPUT"

      - name: Set up Elixir
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Restore deps cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ steps.release_source.outputs.project_root }}/deps
          key: deps-${{ runner.os }}-1.17-27-${{ hashFiles('**/mix.lock') }}
          restore-keys: deps-${{ runner.os }}-1.17-27-

      - name: Install libvips
        run: sudo apt-get update && sudo apt-get install -y libvips-dev

      - name: Install dependencies
        run: mix deps.get

      - name: Install frozen-source dependencies
        working-directory: ${{ steps.release_source.outputs.project_root }}
        run: mix deps.get

      - name: Ensure GitHub release exists for dispatch publish
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.BRANCH_PROTECTION_PAT || github.token }}
          GH_REPO: ${{ github.repository }}
        working-directory: ${{ steps.release_source.outputs.project_root }}
        shell: bash
        run: |
          set -euo pipefail

          version="$(
            elixir -e '
              source = File.read!("mix.exs")
              version =
                Regex.run(~r/@version\s+"([^"]+)"/, source, capture: :all_but_first) ||
                  Regex.run(~r/version:\s+"([^"]+)"/, source, capture: :all_but_first)
              case version do
                [value] -> IO.puts(value)
                _ -> raise "Unable to parse version from mix.exs"
              end
            ' | tr -d '\r'
          )"
          tag_name="rindle-v${version}"
          release_title="rindle: v${version}"

          if gh release view "$tag_name" >/dev/null 2>&1; then
            echo "GitHub release $tag_name already exists."
            exit 0
          fi

          notes="$(
            awk -v version="$version" '
              $0 ~ "^## \\[" version "\\]" { in_section = 1; next }
              in_section && $0 ~ "^## \\[" { exit }
              in_section { print }
            ' CHANGELOG.md
          )"

          test -n "$notes"
          gh release create "$tag_name" \
            --target "${{ needs.gate-ci-green.outputs.release_sha }}" \
            --title "$release_title" \
            --notes "$notes"

      - name: Set up MinIO
        uses: ./.github/actions/setup-minio

      - name: Run release preflight
        env:
          RINDLE_PROJECT_ROOT: ${{ steps.release_source.outputs.project_root }}
        run: bash scripts/release_preflight.sh

      - name: Verify version alignment
        env:
          RINDLE_PROJECT_ROOT: ${{ steps.release_source.outputs.project_root }}
          RINDLE_RELEASE_TAG: ${{ needs.gate-ci-green.outputs.release_tag }}
          RINDLE_EXPECTED_VERSION: ${{ needs.gate-ci-green.outputs.release_version }}
        run: bash scripts/assert_version_match.sh

      - name: Check whether Hex.pm release already exists
        id: idempotency
        env:
          RINDLE_PROJECT_ROOT: ${{ steps.release_source.outputs.project_root }}
          VERSION: ${{ needs.gate-ci-green.outputs.release_version }}
        run: bash scripts/hex_release_exists.sh

      - name: Dry run Hex publish
        if: ${{ steps.idempotency.outputs.already_published != 'true' }}
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        working-directory: ${{ steps.release_source.outputs.project_root }}
        run: mix hex.publish --dry-run --yes

      - name: Publish to Hex.pm (live)
        id: live_publish
        if: ${{ steps.idempotency.outputs.already_published != 'true' }}
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        working-directory: ${{ steps.release_source.outputs.project_root }}
        run: |
          if [ -z "$HEX_API_KEY" ] || [ "$HEX_API_KEY" = "dryrun-placeholder" ]; then
            echo "::error::HEX_API_KEY missing/invalid. Configure repo Settings → Environments → release → secret HEX_API_KEY. See guides/release_publish.md 'One-Time Publish Prerequisites'."
            exit 1
          fi
          mix hex.publish --yes

      - name: Idempotent publish summary
        if: ${{ always() }}
        env:
          VERSION: ${{ needs.gate-ci-green.outputs.release_version }}
        run: |
          if [ "${{ steps.idempotency.outputs.already_published }}" = "true" ]; then
            echo "Skipped publish: rindle $VERSION was already on Hex.pm." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Published rindle $VERSION to Hex.pm." >> "$GITHUB_STEP_SUMMARY"
          fi

  public_verify:
    name: Public Verify
    needs: [gate-ci-green, publish]
    if: ${{ always() && needs.publish.result == 'success' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    env:
      MIX_ENV: dev
      RINDLE_AV_USE_CGROUPS: "false"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      PGPORT: "5432"
      RINDLE_MINIO_URL: http://localhost:9000
      RINDLE_MINIO_ACCESS_KEY: minioadmin
      RINDLE_MINIO_SECRET_KEY: minioadmin
      RINDLE_MINIO_BUCKET: rindle-test
      RINDLE_MINIO_REGION: us-east-1

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rindle_test
        options: >-
          --health-cmd "pg_isready -U postgres -d rindle_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout current verification tooling
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Elixir
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Install FFmpeg
        # Reliable static ffmpeg >= 6, replacing the third-party setup-ffmpeg
        # action which intermittently failed ("Failed to get latest johnvansickle
        # ffmpeg release") and blocked merges. apt only ships 4.4 — below the
        # >= 6.0 gate in lib/rindle/av/probe.ex. Canonical repo path, used 4x in
        # ci.yml. See scripts/ci/install_ffmpeg.sh (CACHE-05, D-14).
        run: bash scripts/ci/install_ffmpeg.sh

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Install libvips
        run: sudo apt-get update && sudo apt-get install -y libvips-dev

      - name: Install dependencies
        run: mix deps.get

      - name: Set up MinIO
        uses: ./.github/actions/setup-minio

      - name: Wait for Hex.pm index (post-publish)
        env:
          VERSION: ${{ needs.publish.outputs.release_version }}
        run: |
          set -euo pipefail
          DEADLINE=$(( SECONDS + 300 ))
          until mix hex.info rindle "$VERSION" >/dev/null 2>&1; do
            if [ "$SECONDS" -ge "$DEADLINE" ]; then
              echo "Release blocked: Hex.pm did not index rindle $VERSION within 5 minutes."
              exit 1
            fi
            echo "Waiting for Hex.pm to index rindle $VERSION..."
            sleep 15
          done
          echo "Hex.pm indexed rindle $VERSION."

      - name: Verify HexDocs reachability
        env:
          VERSION: ${{ needs.publish.outputs.release_version }}
        run: |
          set -euo pipefail
          DEADLINE=$(( SECONDS + 300 ))
          until curl --fail --location --silent --show-error "https://hexdocs.pm/rindle/$VERSION" >/dev/null; do
            if [ "$SECONDS" -ge "$DEADLINE" ]; then
              echo "Release blocked: HexDocs did not serve rindle $VERSION within 5 minutes."
              exit 1
            fi
            echo "Waiting for HexDocs to serve rindle $VERSION..."
            sleep 15
          done
          echo "HexDocs served rindle $VERSION."

      - name: Verify public Hex.pm artifact
        env:
          HEX_API_KEY: ""
          VERSION: ${{ needs.publish.outputs.release_version }}
        run: bash scripts/public_smoke.sh "$VERSION"

  update-release-train-baseline:
    name: Update RELEASE-TRAIN Baseline
    needs: [gate-ci-green, publish, public_verify]
    if: ${{ needs.publish.result == 'success' && needs.public_verify.result == 'success' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Elixir
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Install Hex
        run: mix local.hex --force

      - name: Update RELEASE-TRAIN baseline ledger
        env:
          VERSION: ${{ needs.publish.outputs.release_version }}
          RELEASE_WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CI_GATE_URL: ${{ needs.gate-ci-green.outputs.ci_run_url }}
          PUBLIC_VERIFY_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash scripts/maintainer/update_release_train_baseline.sh "$VERSION"

      - name: Commit and merge baseline update
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.BRANCH_PROTECTION_PAT || github.token }}
          VERSION: ${{ needs.publish.outputs.release_version }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- .planning/RELEASE-TRAIN.md; then
            echo "RELEASE-TRAIN.md already up to date."
            exit 0
          fi

          branch="chore/release-train-baseline-${VERSION}"

          git checkout -b "$branch"
          git add .planning/RELEASE-TRAIN.md
          git commit -m "chore(release): record ${VERSION} baseline in RELEASE-TRAIN.md [skip ci]"
          git push -u origin "$branch"

          pr_url="$(
            gh pr create \
              --base main \
              --head "$branch" \
              --title "chore(release): record ${VERSION} baseline in RELEASE-TRAIN.md" \
              --body "Automated RELEASE-TRAIN.md baseline update after public_verify for ${VERSION}."
          )"

          gh pr merge "$pr_url" --squash --delete-branch --admin
