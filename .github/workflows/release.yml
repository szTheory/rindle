name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      recovery_reason:
        description: "Recovery-only note for rerunning publish from an exact immutable ref"
        required: true
        type: string
      recovery_ref:
        description: "Exact commit SHA or existing tag to recover"
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-please:
    name: Release Please
    if: ${{ github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created || 'false' }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  recovery-validation:
    name: Validate Recovery Ref
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      checkout_ref: ${{ steps.validate.outputs.checkout_ref }}
      release_tag: ${{ steps.validate.outputs.release_tag }}
    steps:
      - name: Checkout repository for recovery validation
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Validate recovery-only inputs and lock to an immutable ref
        id: validate
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ inputs.recovery_reason }}"
          recovery_ref="${{ inputs.recovery_ref }}"
          test -n "$recovery_ref"

          if [[ "$recovery_ref" =~ ^[0-9a-f]{40}$ ]]; then
            git cat-file -e "${recovery_ref}^{commit}"
            echo "checkout_ref=$recovery_ref" >> "$GITHUB_OUTPUT"
            echo "release_tag=" >> "$GITHUB_OUTPUT"
          elif git show-ref --verify --quiet "refs/tags/$recovery_ref"; then
            echo "checkout_ref=$recovery_ref" >> "$GITHUB_OUTPUT"
            echo "release_tag=$recovery_ref" >> "$GITHUB_OUTPUT"
          else
            echo "workflow_dispatch is recovery-only and recovery_ref must be an exact 40-character commit SHA or an existing tag."
            exit 1
          fi

  gate-ci-green:
    name: Gate on Exact-SHA Green CI
    needs: [release-please, recovery-validation]
    if: ${{ always() && ((github.event_name == 'workflow_dispatch' && needs.recovery-validation.result == 'success') || (github.event_name != 'workflow_dispatch' && needs.release-please.outputs.release_created == 'true')) }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
      release_sha: ${{ steps.resolve.outputs.release_sha }}
      release_version: ${{ steps.version.outputs.release_version }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      ci_run_url: ${{ steps.ci.outputs.ci_run_url }}
    steps:
      - name: Resolve release target
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            const ref = context.eventName === 'workflow_dispatch'
              ? '${{ needs.recovery-validation.outputs.checkout_ref }}'
              : '${{ needs.release-please.outputs.tag_name }}';
            const releaseTag = context.eventName === 'workflow_dispatch'
              ? '${{ needs.recovery-validation.outputs.release_tag }}'
              : '${{ needs.release-please.outputs.tag_name }}';

            if (!ref) {
              core.setFailed('No release ref available for publish gating.');
              return;
            }

            const commit = await github.rest.repos.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref
            });

            core.setOutput('checkout_ref', ref);
            core.setOutput('release_sha', commit.data.sha);
            core.setOutput('release_tag', releaseTag || '');

      - name: Checkout release target for version resolution
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.checkout_ref }}

      - name: Set up Elixir for version resolution
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Read release version from mix.exs
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(
            sed -nE \
              -e 's/^@version[[:space:]]+"([^"]+)"/\1/p' \
              -e 's/^[[:space:]]+version:[[:space:]]+"([^"]+)",?/\1/p' \
              mix.exs | head -n1
          )
          test -n "$VERSION"
          echo "release_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Wait for CI to finish green on release SHA
        id: ci
        uses: actions/github-script@v7
        with:
          script: |
            const sha = '${{ steps.resolve.outputs.release_sha }}';
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            let latestUrl = '';

            for (let attempt = 1; attempt <= 60; attempt++) {
              const {data} = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'ci.yml',
                head_sha: sha,
                per_page: 20
              });

              const runs = data.workflow_runs.filter((run) => run.head_sha === sha);
              const latest = runs[0];

              if (!latest) {
                core.info(`No ci.yml runs found yet for ${sha} (${attempt}/60).`);
                await sleep(30000);
                continue;
              }

              latestUrl = latest.html_url;

              if (latest.status !== 'completed') {
                core.info(`ci.yml for ${sha} is ${latest.status} (${attempt}/60): ${latest.html_url}`);
                await sleep(30000);
                continue;
              }

              if (latest.conclusion !== 'success') {
                core.setFailed(`ci.yml for ${sha} concluded with '${latest.conclusion}', not 'success'. Run: ${latest.html_url}`);
                return;
              }

              core.setOutput('ci_run_url', latest.html_url);
              core.info(`ci.yml for ${sha} succeeded: ${latest.html_url}`);
              return;
            }

            core.setFailed(`Timed out waiting for ci.yml to succeed on ${sha}. Last observed run: ${latestUrl || 'none'}`);

  publish:
    name: Publish to Hex
    needs: gate-ci-green
    if: ${{ needs.gate-ci-green.result == 'success' }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
    outputs:
      release_version: ${{ needs.gate-ci-green.outputs.release_version }}
    env:
      MIX_ENV: dev
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      PGPORT: "5432"
      RINDLE_MINIO_URL: http://localhost:9000
      RINDLE_MINIO_ACCESS_KEY: minioadmin
      RINDLE_MINIO_SECRET_KEY: minioadmin
      RINDLE_MINIO_BUCKET: rindle-test
      RINDLE_MINIO_REGION: us-east-1

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rindle_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout exact release ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ needs.gate-ci-green.outputs.checkout_ref }}

      - name: Confirm recovery checkout is detached to the validated immutable ref
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: bash
        run: |
          set -euo pipefail
          git checkout --detach HEAD
          echo "Recovered immutable ref: ${{ needs.gate-ci-green.outputs.checkout_ref }}"

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ runner.os }}-1.17-27-${{ hashFiles('**/mix.lock') }}
          restore-keys: deps-${{ runner.os }}-1.17-27-

      - name: Install libvips
        run: sudo apt-get install -y libvips-dev

      - name: Install dependencies
        run: mix deps.get

      - name: Start MinIO
        run: |
          docker run -d --name rindle-minio -p 9000:9000 -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin minio/minio server /data --console-address ":9001"
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:9000/minio/health/ready >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Install MinIO client
        run: |
          curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o mc
          chmod +x mc
          sudo mv mc /usr/local/bin/mc

      - name: Create MinIO bucket
        run: |
          mc alias set local http://localhost:9000 minioadmin minioadmin
          mc mb --ignore-existing local/rindle-test

      - name: Run release preflight
        run: bash scripts/release_preflight.sh

      - name: Verify version alignment
        env:
          RINDLE_RELEASE_TAG: ${{ needs.gate-ci-green.outputs.release_tag }}
          RINDLE_EXPECTED_VERSION: ${{ needs.gate-ci-green.outputs.release_version }}
        run: bash scripts/assert_version_match.sh

      - name: Dry run Hex publish
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix hex.publish --dry-run --yes

      - name: Live publish to Hex
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: |
          if [ -z "$HEX_API_KEY" ] || [ "$HEX_API_KEY" = "dryrun-placeholder" ]; then
            echo "::error::HEX_API_KEY is missing or invalid. Cannot publish. Ensure the 'release' environment secret is configured."
            exit 1
          fi
          mix hex.publish --yes

  public_verify:
    name: Public Verify
    needs: [gate-ci-green, publish]
    if: ${{ needs.publish.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      MIX_ENV: dev
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      PGPORT: "5432"
      RINDLE_MINIO_URL: http://localhost:9000
      RINDLE_MINIO_ACCESS_KEY: minioadmin
      RINDLE_MINIO_SECRET_KEY: minioadmin
      RINDLE_MINIO_BUCKET: rindle-test
      RINDLE_MINIO_REGION: us-east-1

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rindle_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout release ref for public verification
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate-ci-green.outputs.checkout_ref }}

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Install libvips
        run: sudo apt-get install -y libvips-dev

      - name: Install dependencies
        run: mix deps.get

      - name: Start MinIO
        run: |
          docker run -d --name rindle-minio -p 9000:9000 -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin minio/minio server /data --console-address ":9001"
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:9000/minio/health/ready >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Install MinIO client
        run: |
          curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o mc
          chmod +x mc
          sudo mv mc /usr/local/bin/mc

      - name: Create MinIO bucket
        run: |
          mc alias set local http://localhost:9000 minioadmin minioadmin
          mc mb --ignore-existing local/rindle-test

      - name: Wait for Hex.pm index
        env:
          VERSION: ${{ needs.publish.outputs.release_version }}
        run: |
          set -euo pipefail
          DEADLINE=$(( SECONDS + 300 ))
          until mix hex.info rindle "$VERSION" >/dev/null 2>&1; do
            if [ "$SECONDS" -ge "$DEADLINE" ]; then
              echo "Release blocked: Hex.pm did not index rindle $VERSION within 5 minutes."
              exit 1
            fi
            echo "Waiting for Hex.pm to index rindle $VERSION..."
            sleep 15
          done
          echo "Hex.pm indexed rindle $VERSION."

      - name: Verify public Hex.pm artifact
        env:
          HEX_API_KEY: ""
          VERSION: ${{ needs.publish.outputs.release_version }}
        run: bash scripts/public_smoke.sh "$VERSION"
