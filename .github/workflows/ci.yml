name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # Phase 36 D-19 / external research Topic 1: `labeled` MUST be added
    # explicitly — defaults are [opened, synchronize, reopened] and applying
    # a label to an existing PR will not fire the workflow without it. The
    # other three are defaults but must be enumerated once `types:` is set.
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

# LANE-01 / D-06: serialize runs per-workflow + per-ref so a new push to a PR
# branch supersedes its own in-flight run, while every other branch (and the
# push:main / release run) gets an independent serialization queue.
#   - cancel-in-progress is TRUE only for pull_request events: a stale PR run is
#     abandoned to save runner minutes and sharpen the PR signal.
#   - For push:main and workflow_dispatch it evaluates FALSE, so those runs
#     SERIALIZE and are NEVER cancelled. This is load-bearing for the release
#     coupling: `release.yml gate-ci-green` keys off the push:main `ci.yml` run
#     `conclusion`; cancelling a main run would destroy the full-matrix evidence
#     that the Hex publish gate depends on (the D-06 footgun this avoids).
# Reads only the trusted `github.event_name` context (no PR title/body/branch
# string interpolated into a shell) — no injection surface added.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  MIX_ENV: test

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.15"
            otp: "26"
          - elixir: "1.17"
            otp: "27"
            # CACHE-05 (D-12): version-invariant lint (format/credo/doctor) runs
            # once on the newest home pair so the formatter enforces an
            # up-to-date contributor's local output. Guarded via `if: matrix.lint`.
            lint: true
    env:
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      PGPORT: "5432"
      RINDLE_AV_USE_CGROUPS: "false"

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rindle_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        id: setup
        uses: ./.github/actions/setup-elixir
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
          mix-env: test
          # Quality runs its own deps.get carrying the CACHE-04 gate flags
          # (--check-locked / --check-unused), so the composite must NOT also
          # run an unflagged deps.get (D-10).
          install-deps: "false"

      - name: Install libvips
        run: sudo apt-get update && sudo apt-get install -y libvips-dev

      - name: Install FFmpeg
        # Reliable static ffmpeg >= 6, replacing FedericoCarboni/setup-ffmpeg@v3
        # which intermittently failed ("Failed to get latest johnvansickle ffmpeg
        # release") and blocked merges. apt only ships 4.4 — below the >= 6.0 gate
        # in lib/rindle/av/probe.ex. See scripts/ci/install_ffmpeg.sh.
        run: bash scripts/ci/install_ffmpeg.sh

      # CACHE-04 (D-10): the strict --check-locked drift gate runs only on the
      # lock's canonical OTP (1.17/27) — same guard as --check-unused below, and for
      # the same reason: json_polyfill_dep/0 (mix.exs) adds {:json_polyfill, ...} for
      # OTP < 27, which is absent from the OTP27-resolved mix.lock, so --check-locked
      # cannot pass on 1.15/26 (the lock "needs updating" to add it). The OTP26 cell
      # still fetches deps plainly so compile/test run; strict lock-drift is validated
      # on the canonical OTP only (it is unverifiable on 26 with a conditional dep).
      - name: Install dependencies (lock-verified)
        if: matrix.otp == '27'
        run: mix deps.get --check-locked

      - name: Install dependencies
        if: matrix.otp != '27'
        run: mix deps.get

      # CACHE-04 (D-11): --check-unused is guarded to matrix.otp == '27' — the
      # lock's resolution OTP. Under OTP26 it false-positives because
      # json_polyfill_dep/0 (mix.exs) adds {:json_polyfill, ...} for OTP < 27,
      # which is absent from the OTP27-resolved mix.lock (exit 1).
      - name: Check for unused deps
        if: matrix.otp == '27'
        run: mix deps.unlock --check-unused

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      # CACHE-05 (D-12): version-invariant lint runs once on the lint cell
      # (1.17/27, `lint: true`). The `lint-cell:` marker is grep-able in the run
      # log so the SUMMARY can assert lint actually fired on 1.17/27 and is
      # absent on 1.15/26 (a typo'd `if:` would otherwise skip silently).
      - name: Check formatting
        if: ${{ matrix.lint }}
        run: |
          echo "lint-cell: format running"
          mix format --check-formatted

      # CI-04 (v1.17): Credo and Dialyzer remain advisory (continue-on-error).
      # Doctor and AV doctor also advisory — not part of CI-04 decision record.
      # Default unit suite (mix coveralls) is merge-blocking. See RUNNING.md
      # `### Static analysis policy (CI-04)` and `## CI lane severity`.
      # CACHE-05 (D-12): de-dup only — continue-on-error preserved exactly.
      - name: Credo (strict)
        if: ${{ matrix.lint }}
        run: mix credo --strict
        continue-on-error: true

      - name: Doctor (full, raise)
        if: ${{ matrix.lint }}
        run: MIX_ENV=test mix doctor --full --raise
        continue-on-error: true

      - name: Verify AV runtime with public doctor task
        continue-on-error: true
        run: >
          mix rindle.doctor
          Rindle.Adopter.CanonicalApp.Profile
          Rindle.Adopter.CanonicalApp.VideoProfile

      # OBS-02 (additive, observational): surface schedulers_online + a bounded
      # mix compile --profile time dump in the run summary (fenced + tail-bounded
      # to stay under the 1 MiB $GITHUB_STEP_SUMMARY cap).
      - name: Surface compile profile + schedulers
        if: always()
        run: |
          {
            echo "## Build profile — ${{ github.job }} (${{ matrix.elixir }}/${{ matrix.otp }})"
            echo ""
            echo "- schedulers_online: $(mix run --no-start -e 'IO.puts(System.schedulers_online())')"
            echo '```'
            mix compile --profile time 2>&1 | tail -20 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # The gating step STAYS `mix coveralls` (NOT replaced by coveralls.json).
      # --slowest 20 is additive; tee captures the slowest-test lines + the
      # ExUnit seed (`Randomized with seed N`) into the run summary (OBS-02 D-05).
      - name: Run tests with coverage
        run: |
          set -o pipefail
          mix coveralls --slowest 20 2>&1 | tee /tmp/test.out
          {
            echo "## Test timing — ${{ github.job }} (${{ matrix.elixir }}/${{ matrix.otp }})"
            echo '```'
            grep -E 'Randomized with seed|slowest|^\s+\* test ' /tmp/test.out | tail -30 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # OBS-02 (additive sibling): generate coverage JSON for artifact upload.
      # Does NOT replace the gating `mix coveralls` run above.
      - name: Generate coverage JSON artifact
        if: always()
        run: mix coveralls.json

      - name: Upload JUnit + coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-coverage-${{ github.job }}-${{ matrix.elixir || 'na' }}
          path: |
            _build/test/junit/rindle-junit.xml
            cover/excoveralls.json
          if-no-files-found: warn
          retention-days: 14

      # CACHE-03 (D-07, D-08): PLT restore/save split. The key hashes
      # mix.exs + .dialyzer_ignore.exs (NOT mix.lock) so the multi-minute PLT
      # is not invalidated by every unrelated dep bump; the prefix carries
      # OS+arch+OTP+Elixir+v1. The composite does not surface resolved
      # OTP/Elixir versions at job scope, so the prefix falls back to the
      # coarse matrix.otp/matrix.elixir values (documented in the SUMMARY).
      - name: Restore PLT cache
        uses: actions/cache/restore@v4
        id: plt_cache
        with:
          path: priv/plts
          key: plt-v1-${{ runner.os }}-${{ runner.arch }}-otp${{ matrix.otp }}-elixir${{ matrix.elixir }}-${{ hashFiles('mix.exs', '.dialyzer_ignore.exs') }}
          restore-keys: |
            plt-v1-${{ runner.os }}-${{ runner.arch }}-otp${{ matrix.otp }}-elixir${{ matrix.elixir }}-

      - name: Create PLT directory
        if: steps.plt_cache.outputs.cache-hit != 'true'
        run: mkdir -p priv/plts

      - name: Build PLT
        if: steps.plt_cache.outputs.cache-hit != 'true'
        run: mix dialyzer --plt

      # CACHE-03 crux (D-08): save the built PLT BEFORE the advisory dialyzer
      # analysis step so the PLT persists even though `mix dialyzer` below is
      # continue-on-error. Guarded `cache-hit != 'true'` — NOT `if: always()`.
      - name: Save PLT cache
        if: steps.plt_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: priv/plts
          key: plt-v1-${{ runner.os }}-${{ runner.arch }}-otp${{ matrix.otp }}-elixir${{ matrix.elixir }}-${{ hashFiles('mix.exs', '.dialyzer_ignore.exs') }}

      - name: Dialyzer
        continue-on-error: true
        run: mix dialyzer --format github

      # OBS-01 (additive, observational): surface cache hit/miss in the run summary.
      # cache-hit is 'true' only on an exact key hit; a restore-keys partial hit
      # leaves it empty, hence `|| 'false'`. No gate/topology change.
      - name: Summarize cache hit/miss
        if: always()
        run: |
          {
            echo "## Cache hit/miss — ${{ github.job }} (${{ matrix.elixir }}/${{ matrix.otp }})"
            echo ""
            echo "| Cache | Hit |"
            echo "| --- | --- |"
            echo "| deps  | ${{ steps.setup.outputs.deps-cache-hit || 'false' }} |"
            echo "| build | ${{ steps.setup.outputs.build-cache-hit || 'false' }} |"
            echo "| plt   | ${{ steps.plt_cache.outputs.cache-hit || 'false' }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  optional-dependencies:
    name: ADMIN-06 Optional Dependencies
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.15"
            otp: "26"
          - elixir: "1.17"
            otp: "27"
    env:
      MIX_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        # CACHE-01 / D-06: composite setup + deps/_build cache in the deliberately
        # separate no-optional namespace (cache-prefix:no-optional ->
        # deps-no-optional-v1-… / build-no-optional-v1-…), so this job's
        # --no-optional-deps tree never shares a cache with the default jobs.
        # install-deps:false keeps the job's special `mix deps.get --no-optional-deps`
        # (the composite does not compile / does not run the flagged fetch).
        uses: ./.github/actions/setup-elixir
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
          mix-env: test
          cache-prefix: no-optional
          install-deps: "false"

      - name: Install libvips
        run: sudo apt-get update && sudo apt-get install -y libvips-dev

      - name: Install dependencies without optional packages
        run: MIX_ENV=test mix deps.get --no-optional-deps

      - name: Compile without optional dependencies
        run: MIX_ENV=test mix compile --no-optional-deps --warnings-as-errors

  integration:
    name: Integration
    runs-on: ubuntu-22.04
    needs: [quality, optional-dependencies]
    env:
      MIX_ENV: test
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      PGPORT: "5432"
      RINDLE_MINIO_URL: http://localhost:9000
      RINDLE_MINIO_ACCESS_KEY: minioadmin
      RINDLE_MINIO_SECRET_KEY: minioadmin
      RINDLE_MINIO_BUCKET: rindle-test
      RINDLE_MINIO_REGION: us-east-1

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rindle_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        id: setup
        # CACHE-01 (D-03): single source of truth for BEAM setup + deps/_build
        # cache. install-deps:false keeps this job's own `mix deps.get` (no
        # duplicate). OBS-01 summary below repoints to the composite outputs.
        uses: ./.github/actions/setup-elixir
        with:
          elixir-version: "1.17"
          otp-version: "27"
          mix-env: test
          install-deps: "false"

      # OBS-01 (additive, observational): surface cache hit/miss in the run summary.
      - name: Summarize cache hit/miss
        if: always()
        run: |
          {
            echo "## Cache hit/miss — ${{ github.job }}"
            echo ""
            echo "| Cache | Hit |"
            echo "| --- | --- |"
            echo "| deps  | ${{ steps.setup.outputs.deps-cache-hit || 'false' }} |"
            echo "| build | ${{ steps.setup.outputs.build-cache-hit || 'false' }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install dependencies
        run: mix deps.get

      - name: Install FFmpeg
        # Reliable static ffmpeg >= 6, replacing FedericoCarboni/setup-ffmpeg@v3
        # which intermittently failed ("Failed to get latest johnvansickle ffmpeg
        # release") and blocked merges. apt only ships 4.4 — below the >= 6.0 gate
        # in lib/rindle/av/probe.ex. See scripts/ci/install_ffmpeg.sh.
        run: bash scripts/ci/install_ffmpeg.sh

      - name: Set up MinIO
        uses: ./.github/actions/setup-minio

      - name: Install libvips
        run: sudo apt-get update && sudo apt-get install -y libvips-dev

      # OBS-02 (additive, observational): schedulers_online + bounded compile profile.
      - name: Surface compile profile + schedulers
        if: always()
        run: |
          {
            echo "## Build profile — ${{ github.job }}"
            echo ""
            echo "- schedulers_online: $(mix run --no-start -e 'IO.puts(System.schedulers_online())')"
            echo '```'
            mix compile --profile time 2>&1 | tail -20 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # --slowest 20 is additive; tee captures the slowest-test lines + the ExUnit
      # seed into the run summary (OBS-02 D-05). The gating test invocations are
      # otherwise byte-unchanged (same files, same --include tags).
      - name: Run integration tests
        run: |
          set -o pipefail
          mix test test/rindle/upload/lifecycle_integration_test.exs --include integration --slowest 20 2>&1 | tee /tmp/test.out
          mix test test/rindle/storage/storage_adapter_test.exs --include minio --slowest 20 2>&1 | tee -a /tmp/test.out
          {
            echo "## Test timing — ${{ github.job }}"
            echo '```'
            grep -E 'Randomized with seed|slowest|^\s+\* test ' /tmp/test.out | tail -30 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # OBS-02 (additive): JUnit XML is emitted by test_helper.exs when CI is set
      # (Plan 01); coverage JSON is generated as an additive sibling for upload.
      - name: Generate coverage JSON artifact
        if: always()
        run: mix coveralls.json

      - name: Upload JUnit + coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-coverage-${{ github.job }}-${{ matrix.elixir || 'na' }}
          path: |
            _build/test/junit/rindle-junit.xml
            cover/excoveralls.json
          if-no-files-found: warn
          retention-days: 14

  contract:
    name: Contract
    runs-on: ubuntu-22.04
    # `needs: quality` waits for ALL matrix entries of the quality job
    # (Elixir 1.15/OTP 26 AND Elixir 1.17/OTP 27) to succeed. This is the
    # standard GitHub Actions matrix-needs interaction: a downstream job
    # with `needs: <matrixed_job>` blocks until every matrix variant
    # completes successfully. See:
    # https://docs.github.com/actions/using-jobs/using-jobs-in-a-workflow#defining-prerequisite-jobs
    needs: [quality, optional-dependencies]
    env:
      MIX_ENV: test
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      PGPORT: "5432"

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rindle_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        # CACHE-01 (D-03): composite setup + deps/_build cache. install-deps:false
        # keeps this job's own `mix deps.get` (no duplicate). Composite does not
        # compile — the `Compile` step stays at job level (D-01).
        uses: ./.github/actions/setup-elixir
        with:
          elixir-version: "1.17"
          otp-version: "27"
          mix-env: test
          install-deps: "false"

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Run AV hygiene gate
        run: bash scripts/assert_av_hygiene.sh

      # Phase 71 (CI proof honesty): contract ExUnit suite is advisory; AV hygiene gate
      # remains merge-blocking. See RUNNING.md `## CI lane severity` for the full matrix.
      - name: Run contract tests
        continue-on-error: true
        run: mix test --only contract

  proof:
    name: Proof
    runs-on: ubuntu-22.04
    # Phase 75 (CI-03): merge-blocking docs parity + operator proof tests.
    # See RUNNING.md `## CI lane severity` for the full matrix.
    needs: [quality, optional-dependencies]
    env:
      MIX_ENV: test
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      PGPORT: "5432"

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rindle_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        # CACHE-01 (D-03): composite setup + deps/_build cache. install-deps:false
        # keeps this job's own `mix deps.get` (no duplicate). Composite does not
        # compile — the `Compile` step stays at job level (D-01).
        uses: ./.github/actions/setup-elixir
        with:
          elixir-version: "1.17"
          otp-version: "27"
          mix-env: test
          install-deps: "false"

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Run docs parity tests
        run: mix test test/install_smoke/docs_parity_test.exs

      - name: Run adopter docs link hygiene gate
        run: bash scripts/maintainer/check_docs_links.sh

      - name: Run adoption proof matrix drift gate
        run: bash scripts/maintainer/check_adoption_proof_matrix.sh

      - name: Run batch owner erasure task proof
        run: mix test test/rindle/batch_owner_erasure_task_test.exs

  package-consumer:
    name: Package Consumer Proof Matrix + Release Preflight
    runs-on: ubuntu-22.04
    # Merge-blocking release-readiness lane: install-smoke matrix + release preflight.
    # See RUNNING.md `## CI lane severity` for the full matrix.
    needs: [quality, optional-dependencies]
    env:
      MIX_ENV: test
      RINDLE_AV_USE_CGROUPS: "false"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      PGPORT: "5432"
      RINDLE_MINIO_URL: http://localhost:9000
      RINDLE_MINIO_ACCESS_KEY: minioadmin
      RINDLE_MINIO_SECRET_KEY: minioadmin
      RINDLE_MINIO_BUCKET: rindle-test
      RINDLE_MINIO_REGION: us-east-1

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rindle_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        id: setup
        # CACHE-01 (D-03): composite setup + deps/_build cache. install-deps:false
        # keeps this job's own `mix deps.get` (no duplicate). OBS-01 summary below
        # repoints to the composite outputs. Composite does not compile (D-01).
        uses: ./.github/actions/setup-elixir
        with:
          elixir-version: "1.17"
          otp-version: "27"
          mix-env: test
          install-deps: "false"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up FFmpeg
        # Reliable static ffmpeg >= 6, replacing FedericoCarboni/setup-ffmpeg@v3
        # which intermittently failed ("Failed to get latest johnvansickle ffmpeg
        # release") and blocked merges. apt only ships 4.4 — below the >= 6.0 gate
        # in lib/rindle/av/probe.ex. See scripts/ci/install_ffmpeg.sh.
        run: bash scripts/ci/install_ffmpeg.sh

      - name: Install libvips
        run: sudo apt-get update && sudo apt-get install -y libvips-dev

      # OBS-01 (additive, observational): surface cache hit/miss in the run summary.
      - name: Summarize cache hit/miss
        if: always()
        run: |
          {
            echo "## Cache hit/miss — ${{ github.job }}"
            echo ""
            echo "| Cache | Hit |"
            echo "| --- | --- |"
            echo "| deps  | ${{ steps.setup.outputs.deps-cache-hit || 'false' }} |"
            echo "| build | ${{ steps.setup.outputs.build-cache-hit || 'false' }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install dependencies
        run: mix deps.get

      # OBS-02 (additive, observational): schedulers_online + bounded compile
      # profile for the long-pole package-consumer job. This lane drives
      # install-smoke / release-preflight scripts (not a direct ExUnit run), so
      # the slowest-test/seed surfacing lives in quality/integration; the build
      # profile + schedulers still characterize this job's runner.
      - name: Surface compile profile + schedulers
        if: always()
        run: |
          {
            echo "## Build profile — ${{ github.job }}"
            echo ""
            echo "- schedulers_online: $(mix run --no-start -e 'IO.puts(System.schedulers_online())')"
            echo '```'
            mix compile --profile time 2>&1 | tail -20 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set up MinIO for S3-compatible package-consumer proofs
        uses: ./.github/actions/setup-minio

      - name: Run release preflight
        env:
          MIX_ENV: dev
        run: bash scripts/release_preflight.sh

      - name: Repo hygiene gate (release train)
        run: bash scripts/maintainer/repo_hygiene_check.sh --ci

      - name: Run built-artifact AV package-consumer proof against MinIO
        run: bash scripts/install_smoke.sh video

      - name: Run built-artifact image-only package-consumer proof against MinIO
        run: bash scripts/install_smoke.sh image

      - name: Run built-artifact tus package-consumer proof against MinIO
        run: bash scripts/install_smoke.sh tus

      - name: Run built-artifact Mux-enabled package-consumer proof (cassette mode)
        run: bash scripts/install_smoke.sh mux

      - name: Run built-artifact GCS package-consumer proof (structural only)
        run: bash scripts/install_smoke.sh gcs

      - name: Verify version alignment (mocking tag)
        env:
          MIX_ENV: dev
        run: |
          MIX_VERSION=$(mix run --no-start -e 'IO.write(Mix.Project.config()[:version])')
          export GITHUB_REF_NAME="v${MIX_VERSION}"
          bash scripts/assert_version_match.sh

      - name: Dry-run Hex publish
        env:
          MIX_ENV: dev
          HEX_API_KEY: dryrun-placeholder
        run: mix hex.publish --dry-run --yes

      # OBS-02 (additive sibling): generate coverage JSON, then upload JUnit +
      # coverage artifacts on every run (pass or fail). if-no-files-found: warn
      # keeps the lane green if a given artifact is absent for this job.
      - name: Generate coverage JSON artifact
        if: always()
        run: MIX_ENV=test mix coveralls.json

      - name: Upload JUnit + coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-coverage-${{ github.job }}-${{ matrix.elixir || 'na' }}
          path: |
            _build/test/junit/rindle-junit.xml
            cover/excoveralls.json
          if-no-files-found: warn
          retention-days: 14

  adoption-demo-unit:
    name: Adoption Demo Unit
