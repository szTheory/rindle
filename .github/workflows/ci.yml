name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # Phase 36 D-19 / external research Topic 1: `labeled` MUST be added
    # explicitly — defaults are [opened, synchronize, reopened] and applying
    # a label to an existing PR will not fire the workflow without it. The
    # other three are defaults but must be enumerated once `types:` is set.
    types: [opened, synchronize, reopened, labeled]

env:
  MIX_ENV: test

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.15"
            otp: "26"
          - elixir: "1.17"
            otp: "27"
    env:
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      PGPORT: "5432"

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rindle_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: deps-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: _build
          key: build-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: build-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Install libvips
        run: sudo apt-get update && sudo apt-get install -y libvips-dev

      - name: Install dependencies
        run: mix deps.get

      - name: Install FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          ffmpeg-version: release

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Check formatting
        run: mix format --check-formatted

      # CI-04 (v1.17): Credo and Dialyzer remain advisory (continue-on-error).
      # Doctor and AV doctor also advisory — not part of CI-04 decision record.
      # Default unit suite (mix coveralls) is merge-blocking. See RUNNING.md
      # `### Static analysis policy (CI-04)` and `## CI lane severity`.
      - name: Credo (strict)
        run: mix credo --strict
        continue-on-error: true

      - name: Doctor (full, raise)
        run: MIX_ENV=test mix doctor --full --raise
        continue-on-error: true

      - name: Verify AV runtime with public doctor task
        continue-on-error: true
        run: >
          mix rindle.doctor
          Rindle.Adopter.CanonicalApp.Profile
          Rindle.Adopter.CanonicalApp.VideoProfile

      - name: Run tests with coverage
        run: mix coveralls

      - name: Restore PLT cache
        uses: actions/cache@v4
        id: plt-cache
        with:
          path: priv/plts
          key: plt-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: plt-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Create PLT directory
        if: steps.plt-cache.outputs.cache-hit != 'true'
        run: mkdir -p priv/plts

      - name: Build PLT
        if: steps.plt-cache.outputs.cache-hit != 'true'
        run: mix dialyzer --plt

      - name: Dialyzer
        continue-on-error: true
        run: mix dialyzer --format github

  integration:
    name: Integration
    runs-on: ubuntu-22.04
    needs: quality
    env:
      MIX_ENV: test
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      PGPORT: "5432"
      RINDLE_MINIO_URL: http://localhost:9000
      RINDLE_MINIO_ACCESS_KEY: minioadmin
      RINDLE_MINIO_SECRET_KEY: minioadmin
      RINDLE_MINIO_BUCKET: rindle-test
      RINDLE_MINIO_REGION: us-east-1

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rindle_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ runner.os }}-1.17-27-${{ hashFiles('**/mix.lock') }}
          restore-keys: deps-${{ runner.os }}-1.17-27-

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: _build
          key: build-${{ runner.os }}-1.17-27-${{ hashFiles('**/mix.lock') }}
          restore-keys: build-${{ runner.os }}-1.17-27-

      - name: Install dependencies
        run: mix deps.get

      - name: Install FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          ffmpeg-version: release

      - name: Start MinIO
        run: |
          docker run -d --name rindle-minio -p 9000:9000 -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin minio/minio server /data --console-address ":9001"
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:9000/minio/health/ready >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Install MinIO client
        run: |
          curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o mc
          chmod +x mc
          sudo mv mc /usr/local/bin/mc

      - name: Create MinIO bucket
        run: |
          mc alias set local http://localhost:9000 minioadmin minioadmin
          mc mb --ignore-existing local/rindle-test

      - name: Install libvips
        run: sudo apt-get update && sudo apt-get install -y libvips-dev

      - name: Run integration tests
        run: |
          mix test test/rindle/upload/lifecycle_integration_test.exs --include integration
          mix test test/rindle/storage/storage_adapter_test.exs --include minio

  contract:
    name: Contract
    runs-on: ubuntu-22.04
    # `needs: quality` waits for ALL matrix entries of the quality job
    # (Elixir 1.15/OTP 26 AND Elixir 1.17/OTP 27) to succeed. This is the
    # standard GitHub Actions matrix-needs interaction: a downstream job
    # with `needs: <matrixed_job>` blocks until every matrix variant
    # completes successfully. See:
    # https://docs.github.com/actions/using-jobs/using-jobs-in-a-workflow#defining-prerequisite-jobs
    needs: quality
    env:
      MIX_ENV: test
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      PGPORT: "5432"

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rindle_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ runner.os }}-1.17-27-${{ hashFiles('**/mix.lock') }}
          restore-keys: deps-${{ runner.os }}-1.17-27-

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: _build
          key: build-${{ runner.os }}-1.17-27-${{ hashFiles('**/mix.lock') }}
          restore-keys: build-${{ runner.os }}-1.17-27-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Run AV hygiene gate
        run: bash scripts/assert_av_hygiene.sh

      # Phase 71 (CI proof honesty): contract ExUnit suite is advisory; AV hygiene gate
      # remains merge-blocking. See RUNNING.md `## CI lane severity` for the full matrix.
      - name: Run contract tests
        continue-on-error: true
        run: mix test --only contract

  proof:
    name: Proof
    runs-on: ubuntu-22.04
    # Phase 75 (CI-03): merge-blocking docs parity + operator proof tests.
    # See RUNNING.md `## CI lane severity` for the full matrix.
    needs: quality
    env:
      MIX_ENV: test
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      PGPORT: "5432"

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rindle_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ runner.os }}-1.17-27-${{ hashFiles('**/mix.lock') }}
          restore-keys: deps-${{ runner.os }}-1.17-27-

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: _build
          key: build-${{ runner.os }}-1.17-27-${{ hashFiles('**/mix.lock') }}
          restore-keys: build-${{ runner.os }}-1.17-27-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Run docs parity tests
        run: mix test test/install_smoke/docs_parity_test.exs

      - name: Run batch owner erasure task proof
        run: mix test test/rindle/batch_owner_erasure_task_test.exs

  package-consumer:
    name: Package Consumer Proof Matrix + Release Preflight
    runs-on: ubuntu-22.04
    # Merge-blocking release-readiness lane: install-smoke matrix + release preflight.
    # See RUNNING.md `## CI lane severity` for the full matrix.
    needs: quality
    env:
      MIX_ENV: test
      RINDLE_AV_USE_CGROUPS: "false"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      PGPORT: "5432"
      RINDLE_MINIO_URL: http://localhost:9000
      RINDLE_MINIO_ACCESS_KEY: minioadmin
      RINDLE_MINIO_SECRET_KEY: minioadmin
      RINDLE_MINIO_BUCKET: rindle-test
      RINDLE_MINIO_REGION: us-east-1

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rindle_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          ffmpeg-version: release

      - name: Install libvips
        run: sudo apt-get update && sudo apt-get install -y libvips-dev

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ runner.os }}-1.17-27-${{ hashFiles('**/mix.lock') }}
          restore-keys: deps-${{ runner.os }}-1.17-27-

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: _build
          key: build-${{ runner.os }}-1.17-27-${{ hashFiles('**/mix.lock') }}
          restore-keys: build-${{ runner.os }}-1.17-27-

      - name: Install dependencies
        run: mix deps.get

      - name: Start MinIO for S3-compatible package-consumer proofs
        run: |
          docker run -d --name rindle-minio -p 9000:9000 -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin minio/minio server /data --console-address ":9001"
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:9000/minio/health/ready >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Install MinIO client
        run: |
          curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o mc
          chmod +x mc
          sudo mv mc /usr/local/bin/mc

      - name: Create MinIO bucket for real S3-compatible smoke coverage
        run: |
          mc alias set local http://localhost:9000 minioadmin minioadmin
          mc mb --ignore-existing local/rindle-test

      - name: Run release preflight
        env:
          MIX_ENV: dev
        run: bash scripts/release_preflight.sh

      - name: Repo hygiene gate (release train)
        run: bash scripts/maintainer/repo_hygiene_check.sh --ci

      - name: Run built-artifact AV package-consumer proof against MinIO
        run: bash scripts/install_smoke.sh video

      - name: Run built-artifact image-only package-consumer proof against MinIO
        run: bash scripts/install_smoke.sh image

      - name: Run built-artifact tus package-consumer proof against MinIO
        run: bash scripts/install_smoke.sh tus

      - name: Run built-artifact Mux-enabled package-consumer proof (cassette mode)
        run: bash scripts/install_smoke.sh mux

      - name: Run built-artifact GCS package-consumer proof (structural only)
        run: bash scripts/install_smoke.sh gcs

      - name: Verify version alignment (mocking tag)
        env:
          MIX_ENV: dev
        run: |
          MIX_VERSION=$(mix run --no-start -e 'IO.write(Mix.Project.config()[:version])')
          export GITHUB_REF_NAME="v${MIX_VERSION}"
          bash scripts/assert_version_match.sh

      - name: Dry-run Hex publish
        env:
          MIX_ENV: dev
          HEX_API_KEY: dryrun-placeholder
        run: mix hex.publish --dry-run --yes

  adopter:
    name: Adopter
    runs-on: ubuntu-22.04
    # Merge-blocking release-readiness lane: canonical adopter lifecycle
    # (lifecycle proof only; doc parity is merge-blocking in `proof` job).
    # Runs after quality, integration, and contract. See RUNNING.md
    # `## CI lane severity` for the full matrix.
    needs: [quality, integration, contract]
    env:
      MIX_ENV: test
      RINDLE_AV_USE_CGROUPS: "false"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      PGPORT: "5432"
      RINDLE_MINIO_URL: http://localhost:9000
      RINDLE_MINIO_ACCESS_KEY: minioadmin
      RINDLE_MINIO_SECRET_KEY: minioadmin
      RINDLE_MINIO_BUCKET: rindle-test
      RINDLE_MINIO_REGION: us-east-1

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rindle_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Install libvips
        run: sudo apt-get update && sudo apt-get install -y libvips-dev

      - name: Install FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          ffmpeg-version: release

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ runner.os }}-1.17-27-${{ hashFiles('**/mix.lock') }}
          restore-keys: deps-${{ runner.os }}-1.17-27-

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: _build
          key: build-${{ runner.os }}-1.17-27-${{ hashFiles('**/mix.lock') }}
          restore-keys: build-${{ runner.os }}-1.17-27-

      - name: Install dependencies
        run: mix deps.get

      - name: Start MinIO
        run: |
          docker run -d --name rindle-minio -p 9000:9000 -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin minio/minio server /data --console-address ":9001"
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:9000/minio/health/ready >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Install MinIO client
        run: |
          curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o mc
          chmod +x mc
          sudo mv mc /usr/local/bin/mc

      - name: Create MinIO bucket
        run: |
          mc alias set local http://localhost:9000 minioadmin minioadmin
          mc mb --ignore-existing local/rindle-test

      - name: Run adopter tests
        run: mix test --only adopter test/adopter/canonical_app/lifecycle_test.exs

  # Phase 36 (D-19, D-20, D-22, T-36-FORK-SECRETS, T-36-ASSET-LEAK):
  # Real-Mux soak proof. Sibling top-level job (NOT a step inside
  # package-consumer). Label-gated on `streaming` so only maintainer-
  # initiated PRs hit api.mux.com. Workflow trigger is the safe
  # pull-request event (the targeted/elevated variant is intentionally
  # NOT used) so fork PRs labeled `streaming` fire the lane but
  # ${{ secrets.RINDLE_MUX_* }} resolve to empty strings — the lane
  # fails closed, no fork-secret leak. Three-layer cleanup
  # mitigation: (1) Elixir try/after inside lifecycle_test_source(_, :mux),
  # (2) the lane's normal-path delete on success, (3) `if: always()` step
  # invoking scripts/mux_soak_cleanup.sh as a belt-and-suspenders sweep.
  # Phase 71 (CI proof honesty): see RUNNING.md `## CI lane severity` for the full matrix.
  mux-soak:
    name: Mux Soak (real API)
    runs-on: ubuntu-22.04
    needs: quality
    if: contains(github.event.pull_request.labels.*.name, 'streaming')
    env:
      MIX_ENV: test
      RINDLE_MUX_USE_REAL_API: "1"
      # Phase 36 CR-01: stamp every Mux asset created during the soak lane
      # with `passthrough: "rindle_soak"` so the layer-3 cleanup script
      # (`scripts/mux_soak_cleanup.sh`) can filter on a tag the producer
      # actually writes (the previously-used `meta.rindle_soak` tag was
      # never written by any code path).
      RINDLE_MUX_PASSTHROUGH_TAG: "rindle_soak"
      RINDLE_MUX_TOKEN_ID: ${{ secrets.RINDLE_MUX_TOKEN_ID }}
      RINDLE_MUX_TOKEN_SECRET: ${{ secrets.RINDLE_MUX_TOKEN_SECRET }}
      RINDLE_MUX_SIGNING_KEY_ID: ${{ secrets.RINDLE_MUX_SIGNING_KEY_ID }}
      RINDLE_MUX_SIGNING_PRIVATE_KEY: ${{ secrets.RINDLE_MUX_SIGNING_PRIVATE_KEY }}
      RINDLE_MUX_WEBHOOK_SECRETS: ${{ secrets.RINDLE_MUX_WEBHOOK_SECRETS }}
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      PGPORT: "5432"
      RINDLE_MINIO_URL: http://localhost:9000
      RINDLE_MINIO_ACCESS_KEY: minioadmin
      RINDLE_MINIO_SECRET_KEY: minioadmin
      RINDLE_MINIO_BUCKET: rindle-test
      RINDLE_MINIO_REGION: us-east-1

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rindle_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Install libvips
        run: sudo apt-get update && sudo apt-get install -y libvips-dev

      - name: Install dependencies
        run: mix deps.get

      - name: Start MinIO for soak proof
        run: |
          docker run -d --name rindle-minio -p 9000:9000 -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin minio/minio server /data --console-address ":9001"
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:9000/minio/health/ready >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Install MinIO client
        run: |
          curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o mc
          chmod +x mc
          sudo mv mc /usr/local/bin/mc

      - name: Create MinIO bucket
        run: |
          mc alias set local http://localhost:9000 minioadmin minioadmin
          mc mb --ignore-existing local/rindle-test

      - name: Run real-Mux soak proof
        run: bash scripts/install_smoke.sh mux

      - name: Always-cleanup leaked Mux soak assets (layer 3 belt-and-suspenders)
        if: always()
        run: bash scripts/mux_soak_cleanup.sh

  # GCS Soak job — secret-gated proof lane against a real Google Cloud Storage
  # bucket. Mirrors the mux-soak structural template above (lines 566-653) but
  # gates on secret presence (`secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON != ''`)
  # rather than PR label, per locked decision D-10 + RESEARCH Q7. Fork-PR safe:
  # GitHub Actions resolves `secrets.*` to empty strings on fork PRs with the
  # `pull_request` trigger (NOT `pull_request_target`), so the lane skips
  # cleanly without leaking secrets to fork code. Closes GCS-04.
  # Phase 71 (CI proof honesty): see RUNNING.md `## CI lane severity` for the full matrix.
  gcs-soak:
    name: GCS Soak (real bucket)
    runs-on: ubuntu-22.04
    needs: quality
    if: ${{ github.repository == 'szTheory/rindle' }}
    env:
      MIX_ENV: test
      GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
      RINDLE_GCS_BUCKET: ${{ secrets.RINDLE_GCS_BUCKET }}
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      PGPORT: "5432"

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rindle_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect live GCS secret availability
        id: gcs-live-config
        run: |
          if [ -n "${GOOGLE_APPLICATION_CREDENTIALS_JSON}" ] && [ -n "${RINDLE_GCS_BUCKET}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip live GCS soak when secrets are unavailable
        if: steps.gcs-live-config.outputs.enabled != 'true'
        run: |
          echo "Skipping live GCS soak: GOOGLE_APPLICATION_CREDENTIALS_JSON and/or RINDLE_GCS_BUCKET are not configured."

      - name: Set up Elixir
        if: steps.gcs-live-config.outputs.enabled == 'true'
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Install libvips
        if: steps.gcs-live-config.outputs.enabled == 'true'
        run: sudo apt-get update && sudo apt-get install -y libvips-dev

      - name: Install dependencies
        if: steps.gcs-live-config.outputs.enabled == 'true'
        run: mix deps.get

      # Phase 71 (CI proof honesty): optional provider proof when secrets present;
      # test step stays advisory. See RUNNING.md `## CI lane severity` for the full matrix.
      - name: Run GCS integration tests
        if: steps.gcs-live-config.outputs.enabled == 'true'
        continue-on-error: true
        run: mix test --only gcs

  # Phase 71 (CI proof honesty): secret-gated live GCS install-smoke; job-level
  # continue-on-error when secrets missing. See RUNNING.md `## CI lane severity`.
  package-consumer-gcs-live:
    name: Package Consumer GCS Live Proof
    runs-on: ubuntu-22.04
    continue-on-error: true
    needs: quality
    if: ${{ github.repository == 'szTheory/rindle' }}
    env:
      MIX_ENV: test
      GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
      RINDLE_GCS_BUCKET: ${{ secrets.RINDLE_GCS_BUCKET }}
      RINDLE_INSTALL_SMOKE_GCS_PREFIX: gcs-${{ github.run_id }}-${{ github.run_attempt }}
      RINDLE_INSTALL_SMOKE_GCS_CLEANUP_FILE: .tmp/install-smoke-gcs-cleanup.txt
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      PGPORT: "5432"

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rindle_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect live GCS secret availability
        id: gcs-live-config
        run: |
          if [ -n "${GOOGLE_APPLICATION_CREDENTIALS_JSON}" ] && [ -n "${RINDLE_GCS_BUCKET}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip live package-consumer GCS proof when secrets are unavailable
        if: steps.gcs-live-config.outputs.enabled != 'true'
        run: |
          echo "Skipping live package-consumer GCS proof: GOOGLE_APPLICATION_CREDENTIALS_JSON and/or RINDLE_GCS_BUCKET are not configured."

      - name: Set up Elixir
        if: steps.gcs-live-config.outputs.enabled == 'true'
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Install libvips
        if: steps.gcs-live-config.outputs.enabled == 'true'
        run: sudo apt-get update && sudo apt-get install -y libvips-dev

      - name: Restore deps cache
        if: steps.gcs-live-config.outputs.enabled == 'true'
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ runner.os }}-1.17-27-${{ hashFiles('**/mix.lock') }}
          restore-keys: deps-${{ runner.os }}-1.17-27-

      - name: Restore build cache
        if: steps.gcs-live-config.outputs.enabled == 'true'
        uses: actions/cache@v4
        with:
          path: _build
          key: build-${{ runner.os }}-1.17-27-${{ hashFiles('**/mix.lock') }}
          restore-keys: build-${{ runner.os }}-1.17-27-

      - name: Install dependencies
        if: steps.gcs-live-config.outputs.enabled == 'true'
        run: mix deps.get

      - name: Authenticate for live GCS proof cleanup
        if: steps.gcs-live-config.outputs.enabled == 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}

      - name: Set up gcloud for live GCS cleanup
        if: steps.gcs-live-config.outputs.enabled == 'true'
        uses: google-github-actions/setup-gcloud@v2

      - name: Run live package-consumer GCS resumable proof without logging raw session_uri values
        if: steps.gcs-live-config.outputs.enabled == 'true'
        run: bash scripts/install_smoke.sh gcs

      - name: Always clean up live package-consumer GCS objects for this prefix
        if: ${{ always() && steps.gcs-live-config.outputs.enabled == 'true' }}
        run: |
          if [ -z "${RINDLE_GCS_BUCKET}" ] || [ ! -f "${RINDLE_INSTALL_SMOKE_GCS_CLEANUP_FILE}" ]; then
            exit 0
          fi

          while IFS= read -r upload_key; do
            if [ -n "${upload_key}" ]; then
              gcloud storage rm "gs://${RINDLE_GCS_BUCKET}/${upload_key}" || true
            fi
          done < "${RINDLE_INSTALL_SMOKE_GCS_CLEANUP_FILE}"
