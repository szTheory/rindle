name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  MIX_ENV: test

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.15"
            otp: "26"
          - elixir: "1.17"
            otp: "27"
    env:
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      PGPORT: "5432"

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rindle_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: deps-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: _build
          key: build-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: build-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Install libvips
        run: sudo apt-get install -y libvips-dev

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Check formatting
        run: mix format --check-formatted

      - name: Credo (strict)
        run: mix credo --strict

      - name: Run tests with coverage
        run: mix coveralls

      - name: Restore PLT cache
        uses: actions/cache@v4
        id: plt-cache
        with:
          path: priv/plts
          key: plt-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: plt-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Create PLT directory
        if: steps.plt-cache.outputs.cache-hit != 'true'
        run: mkdir -p priv/plts

      - name: Build PLT
        if: steps.plt-cache.outputs.cache-hit != 'true'
        run: mix dialyzer --plt

      - name: Dialyzer
        run: mix dialyzer --format github

  integration:
    name: Integration
    runs-on: ubuntu-latest
    needs: quality
    env:
      MIX_ENV: test
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      PGPORT: "5432"
      RINDLE_MINIO_URL: http://localhost:9000
      RINDLE_MINIO_ACCESS_KEY: minioadmin
      RINDLE_MINIO_SECRET_KEY: minioadmin
      RINDLE_MINIO_BUCKET: rindle-test
      RINDLE_MINIO_REGION: us-east-1

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rindle_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ runner.os }}-1.17-27-${{ hashFiles('**/mix.lock') }}
          restore-keys: deps-${{ runner.os }}-1.17-27-

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: _build
          key: build-${{ runner.os }}-1.17-27-${{ hashFiles('**/mix.lock') }}
          restore-keys: build-${{ runner.os }}-1.17-27-

      - name: Install dependencies
        run: mix deps.get

      - name: Start MinIO
        run: |
          docker run -d --name rindle-minio -p 9000:9000 -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin minio/minio server /data --console-address ":9001"
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:9000/minio/health/ready >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Install MinIO client
        run: |
          curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o mc
          chmod +x mc
          sudo mv mc /usr/local/bin/mc

      - name: Create MinIO bucket
        run: |
          mc alias set local http://localhost:9000 minioadmin minioadmin
          mc mb --ignore-existing local/rindle-test

      - name: Install libvips
        run: sudo apt-get install -y libvips-dev

      - name: Run integration tests
        run: |
          mix test test/rindle/upload/lifecycle_integration_test.exs --include integration
          mix test test/rindle/storage/storage_adapter_test.exs --include minio

  contract:
    name: Contract
    runs-on: ubuntu-latest
    # `needs: quality` waits for ALL matrix entries of the quality job
    # (Elixir 1.15/OTP 26 AND Elixir 1.17/OTP 27) to succeed. This is the
    # standard GitHub Actions matrix-needs interaction: a downstream job
    # with `needs: <matrixed_job>` blocks until every matrix variant
    # completes successfully. See:
    # https://docs.github.com/actions/using-jobs/using-jobs-in-a-workflow#defining-prerequisite-jobs
    needs: quality
    env:
      MIX_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ runner.os }}-1.17-27-${{ hashFiles('**/mix.lock') }}
          restore-keys: deps-${{ runner.os }}-1.17-27-

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: _build
          key: build-${{ runner.os }}-1.17-27-${{ hashFiles('**/mix.lock') }}
          restore-keys: build-${{ runner.os }}-1.17-27-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Run contract tests
        run: mix test --only contract

  adopter:
    name: Adopter
    runs-on: ubuntu-latest
    # Adopter lane (CI-08): proves the canonical adopter-facing media
    # lifecycle works end-to-end against MinIO + PostgreSQL. Runs ONLY
    # after quality, integration, and contract have all passed — this is
    # the release-readiness signal (D-09 in 05-CONTEXT.md). Listing all
    # three explicitly makes the dependency graph readable in the workflow
    # visualization (integration already needs quality, but the redundancy
    # is intentional documentation).
    needs: [quality, integration, contract]
    env:
      MIX_ENV: test
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      PGPORT: "5432"
      RINDLE_MINIO_URL: http://localhost:9000
      RINDLE_MINIO_ACCESS_KEY: minioadmin
      RINDLE_MINIO_SECRET_KEY: minioadmin
      RINDLE_MINIO_BUCKET: rindle-test
      RINDLE_MINIO_REGION: us-east-1

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rindle_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Install libvips
        run: sudo apt-get install -y libvips-dev

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ runner.os }}-1.17-27-${{ hashFiles('**/mix.lock') }}
          restore-keys: deps-${{ runner.os }}-1.17-27-

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: _build
          key: build-${{ runner.os }}-1.17-27-${{ hashFiles('**/mix.lock') }}
          restore-keys: build-${{ runner.os }}-1.17-27-

      - name: Install dependencies
        run: mix deps.get

      - name: Start MinIO
        run: |
          docker run -d --name rindle-minio -p 9000:9000 -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin minio/minio server /data --console-address ":9001"
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:9000/minio/health/ready >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Install MinIO client
        run: |
          curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o mc
          chmod +x mc
          sudo mv mc /usr/local/bin/mc

      - name: Create MinIO bucket
        run: |
          mc alias set local http://localhost:9000 minioadmin minioadmin
          mc mb --ignore-existing local/rindle-test

      - name: Run adopter tests
        run: mix test --only adopter test/adopter/canonical_app/lifecycle_test.exs

      - name: Verify guides/getting_started.md matches adopter lane (D-16 drift gate)
        run: |
          set -e
          GUIDE=guides/getting_started.md
          if [ ! -f "$GUIDE" ]; then
            echo "FAIL (D-16): $GUIDE missing — DOC-01 must be authored before adopter lane drift check can pass"
            exit 1
          fi
          # The canonical adopter lifecycle uses these three public API calls.
          # If any are missing from the guide snippet, the guide has drifted
          # from the working code path (D-16 / success criterion 5.5).
          MATCHES=$(grep -E "Broker\.initiate_session|Broker\.verify_completion|Rindle\.Delivery\.url" "$GUIDE" | wc -l)
          if [ "$MATCHES" -lt 3 ]; then
            echo "FAIL (D-16): $GUIDE missing one or more canonical adopter API calls"
            echo "Expected at least 3 lines matching: Broker.initiate_session, Broker.verify_completion, Rindle.Delivery.url"
            echo "Found: $MATCHES line(s)"
            grep -nE "Broker\.initiate_session|Broker\.verify_completion|Rindle\.Delivery\.url" "$GUIDE" || true
            exit 1
          fi
          echo "OK: $GUIDE references all 3 canonical adopter API calls ($MATCHES line(s))"
