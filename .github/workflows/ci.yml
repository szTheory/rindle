          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        # CACHE-01 (D-03): composite setup + root deps/_build cache. install-deps:false
        # because the real fetch is the job's `mix deps.get` inside
        # examples/adoption_demo (working-directory block below) — the composite must
        # NOT run an extra root deps.get here.
        uses: ./.github/actions/setup-elixir
        with:
          elixir-version: "1.17"
          otp-version: "27"
