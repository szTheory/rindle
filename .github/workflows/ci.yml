      # The admin console HomeLive runs a runtime doctor on mount that probes
      # ffmpeg (Rindle.AV.Probe.check_ffmpeg!/1 -> System.cmd("ffmpeg", ...)). An
      # absent binary raises :enoent and 500s the page, so the demo (an AV media
      # library) requires ffmpeg present. Use apt (reliable) rather than the
      # johnvansickle download action used elsewhere.
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run adoption demo ExUnit suite
        working-directory: examples/adoption_demo
        run: |
          mix deps.get
          mix ecto.create --quiet
          mix ecto.migrate --quiet
          mix rindle.migrate
          mix test

  cohort-demo-smoke:
