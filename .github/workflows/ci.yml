    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        # CACHE-01 (D-03): composite setup + deps/_build cache. install-deps:false
        # keeps this job's own `mix deps.get` (no duplicate).
        uses: ./.github/actions/setup-elixir
        with:
          elixir-version: "1.17"
