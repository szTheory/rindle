name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # Phase 36 D-19 / external research Topic 1: `labeled` MUST be added
    # explicitly — defaults are [opened, synchronize, reopened] and applying
    # a label to an existing PR will not fire the workflow without it. The
    # other three are defaults but must be enumerated once `types:` is set.
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

env:
  MIX_ENV: test

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.15"
            otp: "26"
          - elixir: "1.17"
            otp: "27"
    env:
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      PGPORT: "5432"
      RINDLE_AV_USE_CGROUPS: "false"

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rindle_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Restore deps cache
        uses: actions/cache@v4
        id: deps-cache
        with:
          path: deps
          key: deps-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: deps-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Restore build cache
        uses: actions/cache@v4
        id: build-cache
        with:
          path: _build
          key: build-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: build-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Install libvips
        run: sudo apt-get update && sudo apt-get install -y libvips-dev

      - name: Install dependencies
        run: mix deps.get

      - name: Install FFmpeg
        # Reliable static ffmpeg >= 6, replacing FedericoCarboni/setup-ffmpeg@v3
        # which intermittently failed ("Failed to get latest johnvansickle ffmpeg
        # release") and blocked merges. apt only ships 4.4 — below the >= 6.0 gate
        # in lib/rindle/av/probe.ex. See scripts/ci/install_ffmpeg.sh.
        run: bash scripts/ci/install_ffmpeg.sh

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Check formatting
        run: mix format --check-formatted

      # CI-04 (v1.17): Credo and Dialyzer remain advisory (continue-on-error).
      # Doctor and AV doctor also advisory — not part of CI-04 decision record.
      # Default unit suite (mix coveralls) is merge-blocking. See RUNNING.md
      # `### Static analysis policy (CI-04)` and `## CI lane severity`.
      - name: Credo (strict)
        run: mix credo --strict
        continue-on-error: true

      - name: Doctor (full, raise)
        run: MIX_ENV=test mix doctor --full --raise
        continue-on-error: true

      - name: Verify AV runtime with public doctor task
        continue-on-error: true
        run: >
          mix rindle.doctor
          Rindle.Adopter.CanonicalApp.Profile
          Rindle.Adopter.CanonicalApp.VideoProfile

      - name: Run tests with coverage
        run: mix coveralls

      - name: Restore PLT cache
        uses: actions/cache@v4
        id: plt-cache
        with:
          path: priv/plts
          key: plt-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: plt-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Create PLT directory
        if: steps.plt-cache.outputs.cache-hit != 'true'
        run: mkdir -p priv/plts

      - name: Build PLT
        if: steps.plt-cache.outputs.cache-hit != 'true'
        run: mix dialyzer --plt

      - name: Dialyzer
        continue-on-error: true
        run: mix dialyzer --format github

      # OBS-01 (additive, observational): surface cache hit/miss in the run summary.
      # cache-hit is 'true' only on an exact key hit; a restore-keys partial hit
      # leaves it empty, hence `|| 'false'`. No gate/topology change.
      - name: Summarize cache hit/miss
        if: always()
        run: |
          {
            echo "## Cache hit/miss — ${{ github.job }} (${{ matrix.elixir }}/${{ matrix.otp }})"
            echo ""
            echo "| Cache | Hit |"
            echo "| --- | --- |"
            echo "| deps  | ${{ steps.deps-cache.outputs.cache-hit || 'false' }} |"
            echo "| build | ${{ steps.build-cache.outputs.cache-hit || 'false' }} |"
            echo "| plt   | ${{ steps.plt-cache.outputs.cache-hit || 'false' }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  optional-dependencies:
    name: ADMIN-06 Optional Dependencies
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.15"
            otp: "26"
          - elixir: "1.17"
            otp: "27"
    env:
      MIX_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-no-optional-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: deps-no-optional-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: _build
          key: build-no-optional-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: build-no-optional-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Install libvips
        run: sudo apt-get update && sudo apt-get install -y libvips-dev

      - name: Install dependencies without optional packages
        run: MIX_ENV=test mix deps.get --no-optional-deps

      - name: Compile without optional dependencies
        run: MIX_ENV=test mix compile --no-optional-deps --warnings-as-errors

  integration:
    name: Integration
    runs-on: ubuntu-22.04
    needs: [quality, optional-dependencies]
    env:
      MIX_ENV: test
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      PGPORT: "5432"
      RINDLE_MINIO_URL: http://localhost:9000
      RINDLE_MINIO_ACCESS_KEY: minioadmin
      RINDLE_MINIO_SECRET_KEY: minioadmin
      RINDLE_MINIO_BUCKET: rindle-test
      RINDLE_MINIO_REGION: us-east-1

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rindle_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Restore deps cache
        uses: actions/cache@v4
        id: deps-cache
        with:
          path: deps
          key: deps-${{ runner.os }}-1.17-27-${{ hashFiles('**/mix.lock') }}
          restore-keys: deps-${{ runner.os }}-1.17-27-

      - name: Restore build cache
        uses: actions/cache@v4
        id: build-cache
        with:
          path: _build
          key: build-${{ runner.os }}-1.17-27-${{ hashFiles('**/mix.lock') }}
          restore-keys: build-${{ runner.os }}-1.17-27-

      # OBS-01 (additive, observational): surface cache hit/miss in the run summary.
      - name: Summarize cache hit/miss
        if: always()
        run: |
          {
            echo "## Cache hit/miss — ${{ github.job }}"
            echo ""
            echo "| Cache | Hit |"
            echo "| --- | --- |"
            echo "| deps  | ${{ steps.deps-cache.outputs.cache-hit || 'false' }} |"
            echo "| build | ${{ steps.build-cache.outputs.cache-hit || 'false' }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install dependencies
        run: mix deps.get

      - name: Install FFmpeg
        # Reliable static ffmpeg >= 6, replacing FedericoCarboni/setup-ffmpeg@v3
        # which intermittently failed ("Failed to get latest johnvansickle ffmpeg
        # release") and blocked merges. apt only ships 4.4 — below the >= 6.0 gate
        # in lib/rindle/av/probe.ex. See scripts/ci/install_ffmpeg.sh.
        run: bash scripts/ci/install_ffmpeg.sh

      - name: Start MinIO
        run: |
          docker run -d --name rindle-minio -p 9000:9000 -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin minio/minio server /data --console-address ":9001"
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:9000/minio/health/ready >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Install MinIO client
        run: |
          curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o mc
          chmod +x mc
          sudo mv mc /usr/local/bin/mc

      - name: Create MinIO bucket
        run: |
          mc alias set local http://localhost:9000 minioadmin minioadmin
          mc mb --ignore-existing local/rindle-test

      - name: Install libvips
        run: sudo apt-get update && sudo apt-get install -y libvips-dev

      - name: Run integration tests
        run: |
          mix test test/rindle/upload/lifecycle_integration_test.exs --include integration
          mix test test/rindle/storage/storage_adapter_test.exs --include minio

  contract:
    name: Contract
    runs-on: ubuntu-22.04
    # `needs: quality` waits for ALL matrix entries of the quality job
    # (Elixir 1.15/OTP 26 AND Elixir 1.17/OTP 27) to succeed. This is the
    # standard GitHub Actions matrix-needs interaction: a downstream job
    # with `needs: <matrixed_job>` blocks until every matrix variant
    # completes successfully. See:
    # https://docs.github.com/actions/using-jobs/using-jobs-in-a-workflow#defining-prerequisite-jobs
    needs: [quality, optional-dependencies]
    env:
      MIX_ENV: test
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      PGPORT: "5432"

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rindle_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ runner.os }}-1.17-27-${{ hashFiles('**/mix.lock') }}
          restore-keys: deps-${{ runner.os }}-1.17-27-

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: _build
          key: build-${{ runner.os }}-1.17-27-${{ hashFiles('**/mix.lock') }}
          restore-keys: build-${{ runner.os }}-1.17-27-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Run AV hygiene gate
        run: bash scripts/assert_av_hygiene.sh

      # Phase 71 (CI proof honesty): contract ExUnit suite is advisory; AV hygiene gate
      # remains merge-blocking. See RUNNING.md `## CI lane severity` for the full matrix.
      - name: Run contract tests
        continue-on-error: true
        run: mix test --only contract

  proof:
    name: Proof
    runs-on: ubuntu-22.04
    # Phase 75 (CI-03): merge-blocking docs parity + operator proof tests.
    # See RUNNING.md `## CI lane severity` for the full matrix.
    needs: [quality, optional-dependencies]
    env:
      MIX_ENV: test
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      PGPORT: "5432"

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rindle_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ runner.os }}-1.17-27-${{ hashFiles('**/mix.lock') }}
          restore-keys: deps-${{ runner.os }}-1.17-27-

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: _build
          key: build-${{ runner.os }}-1.17-27-${{ hashFiles('**/mix.lock') }}
          restore-keys: build-${{ runner.os }}-1.17-27-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Run docs parity tests
        run: mix test test/install_smoke/docs_parity_test.exs

      - name: Run adopter docs link hygiene gate
        run: bash scripts/maintainer/check_docs_links.sh

      - name: Run adoption proof matrix drift gate
        run: bash scripts/maintainer/check_adoption_proof_matrix.sh

      - name: Run batch owner erasure task proof
        run: mix test test/rindle/batch_owner_erasure_task_test.exs

  package-consumer:
    name: Package Consumer Proof Matrix + Release Preflight
    runs-on: ubuntu-22.04
    # Merge-blocking release-readiness lane: install-smoke matrix + release preflight.
    # See RUNNING.md `## CI lane severity` for the full matrix.
    needs: [quality, optional-dependencies]
    env:
      MIX_ENV: test
      RINDLE_AV_USE_CGROUPS: "false"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      PGPORT: "5432"
      RINDLE_MINIO_URL: http://localhost:9000
      RINDLE_MINIO_ACCESS_KEY: minioadmin
      RINDLE_MINIO_SECRET_KEY: minioadmin
      RINDLE_MINIO_BUCKET: rindle-test
      RINDLE_MINIO_REGION: us-east-1

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rindle_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up FFmpeg
        # Reliable static ffmpeg >= 6, replacing FedericoCarboni/setup-ffmpeg@v3
        # which intermittently failed ("Failed to get latest johnvansickle ffmpeg
        # release") and blocked merges. apt only ships 4.4 — below the >= 6.0 gate
        # in lib/rindle/av/probe.ex. See scripts/ci/install_ffmpeg.sh.
        run: bash scripts/ci/install_ffmpeg.sh

      - name: Install libvips
        run: sudo apt-get update && sudo apt-get install -y libvips-dev

      - name: Restore deps cache
        uses: actions/cache@v4
        id: deps-cache
        with:
          path: deps
          key: deps-${{ runner.os }}-1.17-27-${{ hashFiles('**/mix.lock') }}
          restore-keys: deps-${{ runner.os }}-1.17-27-

      - name: Restore build cache
        uses: actions/cache@v4
        id: build-cache
        with:
          path: _build
          key: build-${{ runner.os }}-1.17-27-${{ hashFiles('**/mix.lock') }}
          restore-keys: build-${{ runner.os }}-1.17-27-

      # OBS-01 (additive, observational): surface cache hit/miss in the run summary.
      - name: Summarize cache hit/miss
        if: always()
        run: |
          {
            echo "## Cache hit/miss — ${{ github.job }}"
            echo ""
            echo "| Cache | Hit |"
            echo "| --- | --- |"
            echo "| deps  | ${{ steps.deps-cache.outputs.cache-hit || 'false' }} |"
            echo "| build | ${{ steps.build-cache.outputs.cache-hit || 'false' }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install dependencies
        run: mix deps.get

      - name: Start MinIO for S3-compatible package-consumer proofs
        run: |
          docker run -d --name rindle-minio -p 9000:9000 -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin minio/minio server /data --console-address ":9001"
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:9000/minio/health/ready >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Install MinIO client
        run: |
          curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o mc
          chmod +x mc
          sudo mv mc /usr/local/bin/mc

      - name: Create MinIO bucket for real S3-compatible smoke coverage
        run: |
          mc alias set local http://localhost:9000 minioadmin minioadmin
          mc mb --ignore-existing local/rindle-test

      - name: Run release preflight
        env:
          MIX_ENV: dev
        run: bash scripts/release_preflight.sh

      - name: Repo hygiene gate (release train)
        run: bash scripts/maintainer/repo_hygiene_check.sh --ci

      - name: Run built-artifact AV package-consumer proof against MinIO
        run: bash scripts/install_smoke.sh video

      - name: Run built-artifact image-only package-consumer proof against MinIO
        run: bash scripts/install_smoke.sh image

      - name: Run built-artifact tus package-consumer proof against MinIO
        run: bash scripts/install_smoke.sh tus

      - name: Run built-artifact Mux-enabled package-consumer proof (cassette mode)
        run: bash scripts/install_smoke.sh mux

      - name: Run built-artifact GCS package-consumer proof (structural only)
        run: bash scripts/install_smoke.sh gcs

      - name: Verify version alignment (mocking tag)
        env:
          MIX_ENV: dev
        run: |
          MIX_VERSION=$(mix run --no-start -e 'IO.write(Mix.Project.config()[:version])')
          export GITHUB_REF_NAME="v${MIX_VERSION}"
          bash scripts/assert_version_match.sh

      - name: Dry-run Hex publish
        env:
          MIX_ENV: dev
          HEX_API_KEY: dryrun-placeholder
        run: mix hex.publish --dry-run --yes

  adoption-demo-unit:
    name: Adoption Demo Unit
    runs-on: ubuntu-22.04
    # Fast, merge-blocking ExUnit lane for examples/adoption_demo: brand mark +
    # wordmark, admin-console mount, lifecycle-state display, and README
    # walkthrough parity (Phase 91 UAT, automated). Storage-free — rows are
    # direct-inserted, so no MinIO/FFmpeg/libvips is needed. Postgres only.
    # Complements the heavier browser proof in the `Adoption Demo E2E` lane.
    needs: [quality, optional-dependencies]
    env:
      MIX_ENV: test
      RINDLE_AV_USE_CGROUPS: "false"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      PGPORT: "5432"

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rindle_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      # The admin console HomeLive runs a runtime doctor on mount that probes
      # ffmpeg (Rindle.AV.Probe.check_ffmpeg!/1 -> System.cmd("ffmpeg", ...)). An
      # absent binary raises :enoent and 500s the page, so the demo (an AV media
      # library) requires ffmpeg present. Use apt (reliable) rather than the
      # johnvansickle download action used elsewhere.
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ runner.os }}-1.17-27-${{ hashFiles('**/mix.lock') }}
          restore-keys: deps-${{ runner.os }}-1.17-27-

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: _build
          key: build-${{ runner.os }}-1.17-27-${{ hashFiles('**/mix.lock') }}
          restore-keys: build-${{ runner.os }}-1.17-27-

      - name: Run adoption demo ExUnit suite
        working-directory: examples/adoption_demo
        run: |
          mix deps.get
          mix ecto.create --quiet
          mix ecto.migrate --quiet
          mix rindle.migrate
          mix test

  cohort-demo-smoke:
    name: Cohort Demo Smoke
    runs-on: ubuntu-22.04
    # Merge-blocking cold-start gate for the Docker-compose demo path
    # (scripts/demo/up.sh -> docker/compose.cohort-demo.yml). This is the boot
    # path that broke twice across phases (prod-auth-guard compile failure, stale
    # Elixir pin) and was previously only human-verified. Builds the demo image,
    # boots the full stack, and asserts the homepage + admin console serve 200
    # with seeded data. See scripts/ci/cohort_demo_smoke.sh.
    needs: [quality, optional-dependencies]
    if: github.repository == 'szTheory/rindle'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run cohort demo cold-start smoke
        run: bash scripts/ci/cohort_demo_smoke.sh

  adoption-demo-e2e:
    name: Adoption Demo E2E
    runs-on: ubuntu-22.04
    # Merge-blocking browser proof for examples/adoption_demo, including admin
    # console behavior, theme, actions, and screenshot specs. The gcs-resumable
    # spec remains skipped when live GCS is absent.
    needs: [quality, optional-dependencies]
    if: github.repository == 'szTheory/rindle'
    env:
      MIX_ENV: test
      RINDLE_AV_USE_CGROUPS: "false"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      PGPORT: "5432"
      RINDLE_MINIO_URL: http://localhost:9000
      RINDLE_MINIO_ACCESS_KEY: minioadmin
      RINDLE_MINIO_SECRET_KEY: minioadmin
      RINDLE_MINIO_BUCKET: rindle-test
      RINDLE_MINIO_REGION: us-east-1
      ADOPTION_DEMO_BROWSER_PORT: "4102"

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rindle_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install libvips
        run: sudo apt-get update && sudo apt-get install -y libvips-dev

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ runner.os }}-1.17-27-${{ hashFiles('**/mix.lock') }}
          restore-keys: deps-${{ runner.os }}-1.17-27-

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: _build
          key: build-${{ runner.os }}-1.17-27-${{ hashFiles('**/mix.lock') }}
          restore-keys: build-${{ runner.os }}-1.17-27-

      - name: Install root dependencies
        run: mix deps.get

      - name: Start MinIO for adoption demo
        run: |
          docker run -d --name rindle-minio -p 9000:9000 -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin -e MINIO_API_CORS_ALLOW_ORIGIN='*' minio/minio server /data --console-address ":9001"
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:9000/minio/health/ready >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Install MinIO client
        run: |
          curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o mc
          chmod +x mc
          sudo mv mc /usr/local/bin/mc

      - name: Create MinIO bucket
        run: |
          mc alias set local http://localhost:9000 minioadmin minioadmin
          mc mb --ignore-existing local/rindle-test

      - name: Cohort contrast + literal gate
        run: node brandbook/src/cohort-contrast.mjs

      - name: Run adoption demo Playwright suite
        run: bash scripts/ci/adoption_demo_e2e.sh

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: adoption-demo-playwright-report
          path: |
            examples/adoption_demo/playwright-report/
            examples/adoption_demo/test-results/
          if-no-files-found: ignore

  adopter:
