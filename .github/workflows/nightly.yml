name: Nightly

# LANE-03 nightly lane (separate file — D-12). A `schedule:` trigger on ci.yml
# is DISQUALIFYING: scheduled runs are named `CI` on head_branch main, which
# would fire release-please-automerge.yml's `on: workflow_run: workflows: [CI]`
# + `head_branch == 'main'` listener (no SHA/event filter) on a cron tick →
# it would `gh pr list` an eligible Release Please PR and auto-squash-merge it +
# dispatch release.yml → an UNATTENDED clock-triggered release, violating the
# "never weaken the release gate" invariant. A SEPARATE file with run name
# `Nightly` and a distinct workflow_id is invisible to all three release
# consumers (release-please-automerge workflow_run:[CI], release.yml
# gate-ci-green workflow_id:'ci.yml', branch-protection required-check set) and
# can NEVER become a PR required check (it has no PR-event trigger). Precedent:
# branch-protection-apply.yml is already a standalone scheduled workflow.
#
# D-15: cron 27 7 (07:27 UTC) — off-the-hour avoids the documented top-of-hour
# scheduled-run clustering/queue-drop; offset from branch-protection-apply.yml's
# `:17` for clean log separation in the same low-traffic UTC window.
on:
  schedule:
    - cron: '27 7 * * *'
  workflow_dispatch:

env:
  MIX_ENV: test

permissions:
  contents: read

jobs:
  # D-13: broad OTP×Elixir compatibility on a CURATED ~6-cell diagonal (NOT a
  # cartesian product — cartesian/dynamic-matrix is an explicit milestone
  # anti-feature). fail-fast: false so one red cell never masks the others.
  # The 1.15/25 and 1.15/26 cells deliberately straddle the mix.exs
  # json_polyfill_dep/0 `otp_major < 27` branch (mix.exs:141-147): OTP<27 pulls
  # {:json_polyfill, ...}, OTP>=27 does not — so both sides of the polyfill are
  # exercised on the floor. 1.18/27 + 1.18/28 are the newest/newest drift
  # early-warning. 1.17/27 is the PR ceiling/home cell.
  compat-matrix:
    name: Compat Matrix
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.15"
            otp: "26"
          - elixir: "1.15"
            otp: "25" # OTP < 27 → exercises the json_polyfill_dep/0 branch
          - elixir: "1.16"
            otp: "26"
          - elixir: "1.17"
            otp: "27" # PR ceiling / home cell
          - elixir: "1.18"
            otp: "27"
          - elixir: "1.18"
            otp: "28" # newest/newest drift early-warning
    env:
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      PGPORT: "5432"
      RINDLE_AV_USE_CGROUPS: "false"

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rindle_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Elixir
        id: setup
        # Reuse the setup-elixir composite (D-12: near-zero duplication). The
        # compat matrix spans toolchains the PR lane never installs, so the
        # composite's resolved-version-aware deps/_build cache keys give each
        # cell its own lineage (a cold first build per OTP/Elixir bump is fine
        # nightly). install-deps:false so this job runs its own plain deps.get
        # (no --check-locked: the json_polyfill conditional dep makes the
        # OTP27-resolved mix.lock unverifiable on OTP<27 cells — same reasoning
        # as ci.yml quality).
        uses: ./.github/actions/setup-elixir
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
          mix-env: test
          install-deps: "false"

      - name: Install libvips
        run: sudo apt-get update && sudo apt-get install -y libvips-dev

      - name: Install FFmpeg
        # Reliable static ffmpeg >= 6 (apt only ships 4.4, below the >= 6.0 gate
        # in lib/rindle/av/probe.ex). See scripts/ci/install_ffmpeg.sh.
        run: bash scripts/ci/install_ffmpeg.sh

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Run tests with coverage
        run: mix coveralls

  # D-17: owned, GATING Dialyzer (extracted from ci.yml `quality`'s advisory
  # steps and removed from PR entirely). `mix dialyzer` runs WITHOUT
  # continue-on-error here, so a real type-contract regression or
  # .dialyzer_ignore.exs drift fails the nightly lane — retiring the rotting
  # advisory ignore baseline. MTTD ≈ 24h is acceptable for a contract-confidence
  # signal (the merge-blocking ExUnit suite still catches behavior on every PR).
  #
  # SINGLE-CELL job (1.17/27 home cell) — NOT a strategy.matrix. The PLT-key
  # OTP/Elixir segment therefore uses the job's LITERAL cell values
  # (`otp27-elixir1.17`), NEVER a bare `${{ matrix.otp }}` / `${{ matrix.elixir }}`
  # reference: those render to empty strings in a non-matrix job and would
  # collapse every PLT lineage into one poisoned key. The Phase-104 split keys on
  # matrix.* only because `quality` IS a matrix job.
  dialyzer:
    name: Dialyzer
    runs-on: ubuntu-22.04
    env:
      MIX_ENV: test
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      PGPORT: "5432"
      RINDLE_AV_USE_CGROUPS: "false"

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rindle_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Elixir
        id: setup
        uses: ./.github/actions/setup-elixir
        with:
          elixir-version: "1.17"
          otp-version: "27"
          mix-env: test
          install-deps: "false"

      - name: Install libvips
        run: sudo apt-get update && sudo apt-get install -y libvips-dev

      - name: Install dependencies
        run: mix deps.get

      # D-20: reuse the Phase-104 PLT restore/save SHAPE (restore → create-dir →
      # build-plt → save-BEFORE-analysis). Key hashes mix.exs + .dialyzer_ignore.exs
      # (NOT mix.lock) so the multi-minute PLT survives unrelated dep bumps and is
      # invalidated by ignore-file drift (the anti-rot anchor). The OTP/Elixir
      # segment is the LITERAL home cell `otp27-elixir1.17` (single-cell job — see
      # the job comment); preserve the hashFiles('mix.exs', '.dialyzer_ignore.exs')
      # segment EXACTLY (the acceptance grep depends on it).
      - name: Restore PLT cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        id: plt_cache
        with:
          path: priv/plts
          key: plt-v1-${{ runner.os }}-${{ runner.arch }}-otp27-elixir1.17-${{ hashFiles('mix.exs', '.dialyzer_ignore.exs') }}
          restore-keys: |
            plt-v1-${{ runner.os }}-${{ runner.arch }}-otp27-elixir1.17-

      - name: Create PLT directory
        if: steps.plt_cache.outputs.cache-hit != 'true'
        run: mkdir -p priv/plts

      - name: Build PLT
        if: steps.plt_cache.outputs.cache-hit != 'true'
        run: mix dialyzer --plt

      # Save the built PLT BEFORE the gating analysis below so the multi-minute
      # PLT persists across runs even if `mix dialyzer` fails. Guarded
      # `cache-hit != 'true'` — NOT `if: always()`.
      - name: Save PLT cache
        if: steps.plt_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: priv/plts
          key: plt-v1-${{ runner.os }}-${{ runner.arch }}-otp27-elixir1.17-${{ hashFiles('mix.exs', '.dialyzer_ignore.exs') }}

      # D-17: GATING — NO continue-on-error. A type-contract regression or
      # ignore-file drift fails the nightly lane.
      - name: Dialyzer
        run: mix dialyzer --format github

  # D-14: GCS Soak — moved verbatim from ci.yml into the nightly lane. Real
  # bucket proof; runs on the upstream repo only (`if: github.repository ==`),
  # steps skip when secrets are absent (secrets cannot be referenced in a
  # job-level if). Unlike the old ci.yml home, the `mix test --only gcs` step is
  # now GATING (continue-on-error dropped) so a live-GCS regression is real
  # nightly red surfaced via Nightly Summary + nightly-failure-issue.
  gcs-soak:
    name: GCS Soak (real bucket)
    runs-on: ubuntu-22.04
    if: ${{ github.repository == 'szTheory/rindle' }}
    env:
      MIX_ENV: test
      GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
      RINDLE_GCS_BUCKET: ${{ secrets.RINDLE_GCS_BUCKET }}
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      PGPORT: "5432"

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rindle_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Detect live GCS secret availability
        id: gcs-live-config
        run: |
          if [ -n "${GOOGLE_APPLICATION_CREDENTIALS_JSON}" ] && [ -n "${RINDLE_GCS_BUCKET}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip live GCS soak when secrets are unavailable
        if: steps.gcs-live-config.outputs.enabled != 'true'
        run: |
          echo "Skipping live GCS soak: GOOGLE_APPLICATION_CREDENTIALS_JSON and/or RINDLE_GCS_BUCKET are not configured."

      - name: Set up Elixir
        if: steps.gcs-live-config.outputs.enabled == 'true'
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Install libvips
        if: steps.gcs-live-config.outputs.enabled == 'true'
        run: sudo apt-get update && sudo apt-get install -y libvips-dev

      - name: Install dependencies
        if: steps.gcs-live-config.outputs.enabled == 'true'
        run: mix deps.get

      # D-14: now GATING in nightly (continue-on-error dropped vs. the old ci.yml
      # advisory home) so a real GCS regression is a real nightly red.
      - name: Run GCS integration tests
        if: steps.gcs-live-config.outputs.enabled == 'true'
        run: mix test --only gcs

  # D-14: Package Consumer GCS Live Proof — moved verbatim from ci.yml. The
  # job-level `continue-on-error: true` is DROPPED on the move so a live-GCS
  # install-smoke failure becomes real nightly signal (the 105 D-04 masking trap
  # is retired here). Secret-gated + repo-restricted: forks never reach it.
  package-consumer-gcs-live:
    name: Package Consumer GCS Live Proof
    runs-on: ubuntu-22.04
    if: ${{ github.repository == 'szTheory/rindle' }}
    env:
      MIX_ENV: test
      GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
      RINDLE_GCS_BUCKET: ${{ secrets.RINDLE_GCS_BUCKET }}
      RINDLE_INSTALL_SMOKE_GCS_PREFIX: gcs-${{ github.run_id }}-${{ github.run_attempt }}
      RINDLE_INSTALL_SMOKE_GCS_CLEANUP_FILE: .tmp/install-smoke-gcs-cleanup.txt
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      PGPORT: "5432"

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rindle_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Detect live GCS secret availability
        id: gcs-live-config
        run: |
          if [ -n "${GOOGLE_APPLICATION_CREDENTIALS_JSON}" ] && [ -n "${RINDLE_GCS_BUCKET}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip live package-consumer GCS proof when secrets are unavailable
        if: steps.gcs-live-config.outputs.enabled != 'true'
        run: |
          echo "Skipping live package-consumer GCS proof: GOOGLE_APPLICATION_CREDENTIALS_JSON and/or RINDLE_GCS_BUCKET are not configured."

      - name: Set up Elixir
        # CACHE-01 (D-03): composite setup + deps/_build cache, carrying the same
        # secret-gated `enabled == 'true'` guard so it never runs on a fork PR
        # without GCS secrets. install-deps:false keeps this job's own
        # enabled-gated `mix deps.get`.
        if: steps.gcs-live-config.outputs.enabled == 'true'
        uses: ./.github/actions/setup-elixir
        with:
          elixir-version: "1.17"
          otp-version: "27"
          mix-env: test
          install-deps: "false"

      - name: Install libvips
        if: steps.gcs-live-config.outputs.enabled == 'true'
        run: sudo apt-get update && sudo apt-get install -y libvips-dev

      - name: Install dependencies
        if: steps.gcs-live-config.outputs.enabled == 'true'
        run: mix deps.get

      - name: Authenticate for live GCS proof cleanup
        if: steps.gcs-live-config.outputs.enabled == 'true'
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          credentials_json: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}

      - name: Set up gcloud for live GCS cleanup
        if: steps.gcs-live-config.outputs.enabled == 'true'
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2.2.1

      - name: Run live package-consumer GCS resumable proof without logging raw session_uri values
        if: steps.gcs-live-config.outputs.enabled == 'true'
        run: bash scripts/install_smoke.sh gcs

      - name: Adoption demo GCS live companion (documented lane; install_smoke is canonical)
        if: steps.gcs-live-config.outputs.enabled == 'true'
        run: bash scripts/ci/adoption_demo_gcs_live.sh

      - name: Always clean up live package-consumer GCS objects for this prefix
        if: ${{ always() && steps.gcs-live-config.outputs.enabled == 'true' }}
        run: |
          if [ -z "${RINDLE_GCS_BUCKET}" ] || [ ! -f "${RINDLE_INSTALL_SMOKE_GCS_CLEANUP_FILE}" ]; then
            exit 0
          fi

          while IFS= read -r upload_key; do
            if [ -n "${upload_key}" ]; then
              gcloud storage rm "gs://${RINDLE_GCS_BUCKET}/${upload_key}" || true
            fi
          done < "${RINDLE_INSTALL_SMOKE_GCS_CLEANUP_FILE}"

  # D-16: Nightly Summary — mirrors the ci.yml CI Summary / ci-observability
  # bash-loop-over-needs.*.result + $GITHUB_STEP_SUMMARY table idiom for
  # at-a-glance nightly status. Advisory only (never a required check).
  # `if: always()` so it reports even when an upstream lane failed.
  nightly-summary:
    name: Nightly Summary
    runs-on: ubuntu-22.04
    needs:
      - compat-matrix
      - dialyzer
      - gcs-soak
      - package-consumer-gcs-live
    if: always()
    steps:
      - name: Summarize nightly job results
        env:
          COMPAT_MATRIX: ${{ needs.compat-matrix.result }}
          DIALYZER: ${{ needs.dialyzer.result }}
          GCS_SOAK: ${{ needs.gcs-soak.result }}
          GCS_LIVE: ${{ needs.package-consumer-gcs-live.result }}
        run: |
          {
            echo "## Nightly Summary"
            echo ""
            echo "| Job | Result |"
            echo "| --- | --- |"
            echo "| Compat Matrix | ${COMPAT_MATRIX} |"
            echo "| Dialyzer | ${DIALYZER} |"
            echo "| GCS Soak | ${GCS_SOAK} |"
            echo "| Package Consumer GCS Live | ${GCS_LIVE} |"
          } >> "$GITHUB_STEP_SUMMARY"

  # D-16: issue-on-failure — opens or updates a single tracking issue when a
  # SCHEDULED nightly run fails (default GitHub scheduled-failure emails only
  # reach the last committer — insufficient for the maintainer-as-consumer JTBD).
  # `if: failure() && github.event_name == 'schedule'` so a manual
  # workflow_dispatch debugging run never files an issue. Job-scoped
  # `permissions: issues: write` and NOTHING else (D-16 least privilege): the
  # top-level workflow default stays `contents: read`, so this job cannot push
  # code or merge PRs. Inline `gh issue` find-open-else-create (zero new
  # dependency, house bash idiom) — no third-party action (SHA-pinning is
  # Phase 107). Issue body is composed from static text + trusted needs.*.result
  # context only (no untrusted event field interpolated into the shell).
  nightly-failure-issue:
    name: Nightly Failure Issue
    runs-on: ubuntu-22.04
    needs:
      - compat-matrix
      - dialyzer
      - gcs-soak
      - package-consumer-gcs-live
    if: failure() && github.event_name == 'schedule'
    permissions:
      issues: write
    steps:
      - name: Open or update the nightly-failure tracking issue
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMPAT_MATRIX: ${{ needs.compat-matrix.result }}
          DIALYZER: ${{ needs.dialyzer.result }}
          GCS_SOAK: ${{ needs.gcs-soak.result }}
          GCS_LIVE: ${{ needs.package-consumer-gcs-live.result }}
        run: |
          set -euo pipefail

          title="Nightly CI failure"
          label="nightly-failure"

          body="$(
            printf '%s\n\n' "A scheduled nightly run failed: ${RUN_URL}"
            printf '%s\n' "| Job | Result |"
            printf '%s\n' "| --- | --- |"
            printf '| Compat Matrix | %s |\n' "${COMPAT_MATRIX}"
            printf '| Dialyzer | %s |\n' "${DIALYZER}"
            printf '| GCS Soak | %s |\n' "${GCS_SOAK}"
            printf '| Package Consumer GCS Live | %s |\n' "${GCS_LIVE}"
          )"

          existing="$(
            gh issue list \
              --state open \
              --label "$label" \
              --search "$title in:title" \
              --json number \
              --jq '.[0].number // ""'
          )"

          if [ -n "$existing" ]; then
            echo "Commenting on existing nightly-failure issue #$existing"
            gh issue comment "$existing" --body "$body"
          else
            echo "Creating a new nightly-failure tracking issue"
            gh label create "$label" --color B60205 --description "Tracks scheduled nightly CI failures" 2>/dev/null || true
            gh issue create --title "$title" --label "$label" --body "$body"
          fi
