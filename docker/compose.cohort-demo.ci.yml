# CI override for the Cohort demo cold-start smoke (scripts/ci/cohort_demo_smoke.sh).
#
# The base compose already points server-side ops at the in-network `minio:9000` service
# (RINDLE_MINIO_URL) and only signs browser-facing presigned URLs for the host-published port
# (RINDLE_MINIO_PUBLIC_URL). The smoke needs only server-side reachability (boot + seed + read
# surfaces), not browser presigned uploads, so this override pins RINDLE_MINIO_URL explicitly
# for clarity; it matches the base and works identically on Linux CI and Docker Desktop.
name: cohort-demo

services:
  cohort-demo:
    environment:
      RINDLE_MINIO_URL: "http://minio:9000"
