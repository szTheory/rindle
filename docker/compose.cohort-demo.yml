name: cohort-demo

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: adoption_demo_dev
    volumes:
      - cohort-demo-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d adoption_demo_dev"]
      interval: 2s
      timeout: 5s
      retries: 15

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    ports:
      - "127.0.0.1:${COHORT_MINIO_PORT:-9000}:9000"
      - "127.0.0.1:${COHORT_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - cohort-demo-minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 2s
      timeout: 5s
      retries: 15

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb --ignore-existing local/rindle-test
        cat > /tmp/cors.json <<'EOF'
        [
          {
            "AllowedOrigin": ["*"],
            "AllowedMethod": ["GET", "PUT", "POST", "HEAD", "DELETE", "PATCH", "OPTIONS"],
            "AllowedHeader": ["*"],
            "ExposeHeader": ["ETag", "x-amz-request-id", "x-amz-version-id"]
          }
        ]
        EOF
        mc cors set local/rindle-test /tmp/cors.json || true
    restart: "no"

  cohort-demo:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cohort-demo
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:${COHORT_DEMO_PORT:-4102}:4102"
    environment:
      # Built as a dev/preview env (not prod) so the unauthenticated admin console
      # mount is permitted — this is a loopback preview, never a deployment. See the
      # Dockerfile header and the demo router for the prod-correct adopter pattern.
      MIX_ENV: dev
      COHORT_DEMO_DOCKER: "1"
      PHX_SERVER: "true"
      PORT: "4102"
      PHX_HOST: localhost
      # Host-published ports, surfaced inline on the launchpad access panel so the
      # auto-bumped values are always shown correctly.
      COHORT_DEMO_PORT: "${COHORT_DEMO_PORT:-4102}"
      COHORT_MINIO_PORT: "${COHORT_MINIO_PORT:-9000}"
      COHORT_MINIO_CONSOLE_PORT: "${COHORT_MINIO_CONSOLE_PORT:-9001}"
      # dev.exs reads PG* for the Repo; point them at the postgres service.
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      # Split-horizon S3 endpoints. Server-side ops talk to MinIO over the in-network
      # compose service (always reachable from the app container, on Mac/Windows AND Linux CI).
      RINDLE_MINIO_URL: "http://minio:9000"
      # Browser-facing presigned URLs are signed for the host-published port, which the Mac/
      # Windows host browser CAN resolve (host.docker.internal cannot be resolved off-container).
      RINDLE_MINIO_PUBLIC_URL: "http://localhost:${COHORT_MINIO_PORT:-9000}"
      RINDLE_MINIO_ACCESS_KEY: minioadmin
      RINDLE_MINIO_SECRET_KEY: minioadmin
      RINDLE_MINIO_BUCKET: rindle-test
      RINDLE_MINIO_REGION: us-east-1

volumes:
  cohort-demo-postgres:
  cohort-demo-minio:
